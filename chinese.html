<!DOCTYPE html>
<html lang="zh-CN">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>

* {

body {

#app {

.nav-tabs {

.nav-tab {

.nav-tab.english {

.nav-tab.english:hover {

.header {

}

.header h1 {

}

.search-box {

  background: var(--color-background-primary);
  color: var(--color-text-primary);

.search-box:focus {

.search-box::placeholder {

.stats {

.spill {

.pgbar {

  height: 6px;

}

.pgfill {

}

.cats {

.cat {

.cat:hover {

}

.grid {

.card {

.card.done:hover {

}

  gap: 0;

.biling-half:first-child {

.card-emoji {

.card-pinyin {

.card-meaning {

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;

@keyframes fadeIn {

.modal {

.modal-cat {

.modal-cat-badge {

.modal-emoji {

.modal-simp {

.modal:hover .modal-simp {

.modal-trad {

.btn-speak:hover {

.btn-learn {

.btn-close {

@media (max-width: 480px) {

</style>

<script>
const TC={1:'#EF4444',2:'#10B981',3:'#F59E0B',4:'#3B82F6',5:'#9CA3AF'};
const CATS=['е…ЁйғЁ','ж•°еӯ—','е®¶дәә','иә«дҪ“','еҠЁзү©','жӨҚзү©','йўңиүІ','йЈҹзү©','иҮӘз„¶','еҠЁдҪң','ж–№дҪҚ','ж—¶й—ҙ','еҪўе®№','ж–Үе…·','еӯҰд№ ','дәӨйҖҡе·Ҙе…·','еӨ©ж°”','жғ…ж„ҹ','иҒҢдёҡ','зү©е“Ғ','е»әзӯ‘','жңҚиЈ…','ж°ҙжһң','и”¬иҸң','е®¶е…·','з”өеҷЁ','иҠӮж—Ҙ','иҝҗеҠЁ','д№җеҷЁ','з–ҫз—…'];

const seen=new Set(), CHARS=[];
for(const d of RAW){if(!seen.has(d.s)){seen.add(d.s);CHARS.push(d);}}

let curCat='е…ЁйғЁ', learned=new Set(), selIdx=null, sq='', showDiffOnly=false;
let gistToken = localStorage.getItem('gistToken') || '';
let gistId = localStorage.getItem('gistId') || '';

const DB_NAME = 'ChineseCharDB';
const DB_VERSION = 1;
const STORE_NAME = 'learnedChars';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
  });
}

async function loadLearned() {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get('learned');
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        const data = request.result;
        if (data && data.chars) {
          resolve(new Set(data.chars));
        } else {
          const localStorageData = localStorage.getItem('lc3');
          if (localStorageData) {
            const lsSet = new Set(JSON.parse(localStorageData));
            saveLearned(lsSet);
            resolve(lsSet);
          } else {
            resolve(new Set());
          }
        }
      };
    });
  } catch (e) {
    const localStorageData = localStorage.getItem('lc3');
    return localStorageData ? new Set(JSON.parse(localStorageData)) : new Set();
  }
}

async function saveLearned(charsSet) {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put({ chars: [...charsSet] }, 'learned');
    transaction.oncomplete = () => {
      localStorage.setItem('lc3', JSON.stringify([...charsSet]));
    };
    transaction.onerror = () => {
      localStorage.setItem('lc3', JSON.stringify([...charsSet]));
    };
  } catch (e) {
    localStorage.setItem('lc3', JSON.stringify([...charsSet]));
  }
}

function exportData() {
  const data = {
    learned: [...learned],
    exportTime: new Date().toISOString(),
    version: '1.0'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `жұүеӯ—еӯҰд№ иҝӣеәҰ_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.learned && Array.isArray(data.learned)) {
        learned = new Set(data.learned);
        await saveLearned(learned);
        if (gistToken) await syncToGist();
        renderStats();
        renderGrid();
        alert('еҜје…ҘжҲҗеҠҹпјҒе·ІеҜје…Ҙ ' + data.learned.length + ' дёӘе·ІеӯҰжұүеӯ—');
      } else {
        alert('ж— ж•Ҳзҡ„еҜје…Ҙж–Үд»¶');
      }
    } catch (e) {
      alert('еҜје…ҘеӨұиҙҘпјҡ' + e.message);
    }
  };
  reader.readAsText(file);
}

function setGistConfig() {
  const token = prompt('иҜ·иҫ“е…Ҙ GitHub Personal Access Token:\n\nиҺ·еҸ–ж–№ејҸпјҡhttps://github.com/settings/tokens\nйңҖиҰҒеӢҫйҖү gist жқғйҷҗ', gistToken);
  if (token === null) return;
  
  if (token.trim()) {
    gistToken = token.trim();
    localStorage.setItem('gistToken', gistToken);
    
    const existingGistId = prompt('иҜ·иҫ“е…Ҙе·Іжңүзҡ„ Gist IDпјҲеҸҜйҖүпјҢз•ҷз©әеҲҷеҲӣе»әж–°Gistпјү:', gistId);
    if (existingGistId !== null) {
      if (existingGistId.trim()) {
        gistId = existingGistId.trim();
        localStorage.setItem('gistId', gistId);
      } else {
        gistId = '';

async function syncToGist() {
  if (!gistToken) {
    alert('иҜ·е…Ҳй…ҚзҪ® GitHub Token');
    return;
  }
  
  const data = {
    learned: [...learned],
    exportTime: new Date().toISOString(),
    version: '1.0'
  };
  
  const gistData = {
    description: 'жұүеӯ—д№җеӣӯ - еӯҰд№ иҝӣеәҰеӨҮд»Ҫ',
    public: false,
    files: {
      'chinese_chars_progress.json': {
        content: JSON.stringify(data, null, 2)
      }
    }
  };
  
  try {
    const url = gistId 
      ? `https://api.github.com/gists/${gistId}`
      : 'https://api.github.com/gists';
    
    const method = gistId ? 'PATCH' : 'POST';
    
    const response = await fetch(url, {
      method,
      headers: {
        'Authorization': `token ${gistToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(gistData)
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    const result = await response.json();
    if (!gistId) {
      gistId = result.id;
      localStorage.setItem('gistId', gistId);
    }
    
    alert(`вң… еҗҢжӯҘжҲҗеҠҹпјҒ\nGist ID: ${gistId}`);
  } catch (e) {
    alert(`вқҢ еҗҢжӯҘеӨұиҙҘпјҡ${e.message}`);
  }
}

async function syncFromGist() {
  if (!gistToken) {
    alert('иҜ·е…Ҳй…ҚзҪ® GitHub Token');
    return;
  }
  
  if (!gistId) {
    alert('иҜ·е…Ҳй…ҚзҪ® Gist ID жҲ–е…ҲеҗҢжӯҘдёҖж¬ЎеҲӣе»ә Gist');
    return;
  }
  
  try {
    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: {
        'Authorization': `token ${gistToken}`
      }
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    const gist = await response.json();
    const content = gist.files['chinese_chars_progress.json']?.content;
    
    if (!content) {
      throw new Error('Gist дёӯжңӘжүҫеҲ°еӯҰд№ иҝӣеәҰж–Үд»¶');
    }
    
    const data = JSON.parse(content);
    if (data.learned && Array.isArray(data.learned)) {
      learned = new Set(data.learned);
      await saveLearned(learned);
      renderStats();
      renderGrid();
      alert(`вң… д»Һ Gist еҗҢжӯҘжҲҗеҠҹпјҒ\nе·ІеҠ иҪҪ ${data.learned.length} дёӘе·ІеӯҰжұүеӯ—`);
    } else {
      alert('Gist дёӯзҡ„ж•°жҚ®ж јејҸж— ж•Ҳ');
    }
  } catch (e) {
    alert(`вқҢ еҗҢжӯҘеӨұиҙҘпјҡ${e.message}`);
  }
}

function toneLabel(t){return{1:'дёҖеЈ°',2:'дәҢеЈ°',3:'дёүеЈ°',4:'еӣӣеЈ°',5:'иҪ»еЈ°'}[t]||'';}

function renderStats(){
  const list=getList();
  const tot=list.length;
  const done=list.filter(ch=>learned.has(ch.s)).length;
  const pct=tot>0?Math.round(done/tot*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="spill">е·ІеӯҰ <b>${done}</b> еӯ—</div>
    <div class="spill">е…ұ <b>${tot}</b> еӯ—</div>
    <div class="spill">е®ҢжҲҗ <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function getCatCount(cat) {
  return CHARS.filter(ch => {
    const co = cat === 'е…ЁйғЁ' || ch.c === cat;
    const qo = !sq || ch.s.includes(sq) || ch.t.includes(sq) || ch.p.toLowerCase().includes(sq.toLowerCase()) || ch.m.includes(sq);
    const dof = !showDiffOnly || ch.s !== ch.t;
    return co && qo && dof;
  }).length;
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    `<button class="cat${c===curCat?' on':''}" onclick="setCat('${c}')">${c} <span style="font-size:11px;opacity:0.7">[${getCatCount(c)}]</span></button>`
  ).join('');
}

function setCat(c){curCat=c;renderCats();renderGrid();}
function doFilter(){sq=document.getElementById('sb').value.trim();renderCats();renderGrid();}

function toggleDiffOnly(){
  showDiffOnly=!showDiffOnly;
  const btn=document.getElementById('btnDiff');
  btn.className='cat'+(showDiffOnly?' on':'');
  btn.textContent=showDiffOnly?'рҹ”„ з№Ғз®ҖдёҚеҗҢ':'рҹ”„ е…ЁйғЁ';
  renderCats();
  renderGrid();
}

function getList(){
  return CHARS.filter(ch=>{
    const co=curCat==='е…ЁйғЁ'||ch.c===curCat;
    const qo=!sq||ch.s.includes(sq)||ch.t.includes(sq)||ch.p.toLowerCase().includes(sq.toLowerCase())||ch.m.includes(sq);
    const dof=!showDiffOnly||ch.s!==ch.t;
    return co&&qo&&dof;
  });
}

    'дәәз§°зұ»':'рҹ‘Ө','д»ЈиҜҚзұ»':'рҹ‘Ө','еҠЁиҜҚзұ»':'рҹ”§','еҪўе®№иҜҚ':'вңЁ','еүҜиҜҚзұ»':'вңЁ',
    'иҝһиҜҚзұ»':'рҹ”—','й—®еҖҷзұ»':'рҹ‘Ӣ','еҶ иҜҚзұ»':'рҹ“қ','йҷҗе®ҡиҜҚ':'рҹ“Ҡ','й—®еҖҷ':'рҹ‘Ӣ'
  };
  return catEmoji[category]||'рҹ“ҡ';
}

function renderGrid(){
  const list=getList();
  if(!list.length){document.getElementById('grid').innerHTML=`<div class="empty">жІЎжңүжүҫеҲ°гҖҢ${sq}гҖҚзӣёе…іжұүеӯ—</div>`;return;}
  document.getElementById('grid').innerHTML=list.map(ch=>{
    const isL=learned.has(ch.s);
    const same=ch.s===ch.t;
    const emoji=getEmoji(ch.m,ch.c);
    return `<div class="card${isL?' done':''}" onclick="openModal(${CHARS.indexOf(ch)})">
      ${isL?'<span class="done-badge">вң“ еӯҰдјҡ</span>':''}
      <div class="card-emoji">${emoji}</div>
      <div class="biling">
        <div class="biling-half">
          <div class="biling-label">з®ҖдҪ“</div>
          <div class="simp-char">${ch.s}</div>
        </div>
        <div class="biling-half">
          <div class="biling-label">з№Ғй«”</div>
          <div class="trad-char">${ch.t}</div>
          ${same?'<div class="same-note">еҗҢз®ҖдҪ“</div>':''}
        </div>
      </div>
      <div class="card-pinyin" style="color:${TC[ch.tn]}">${ch.p} <span style="font-size:11px;color:var(--color-text-tertiary)">${toneLabel(ch.tn)}</span></div>
      <div class="card-meaning">${ch.m}</div>
    </div>`;
  }).join('');
}

function openModal(idx){
  selIdx=idx;
  const ch=CHARS[idx];
  const same=ch.s===ch.t;
  document.getElementById('mCat').innerHTML=`<span class="modal-cat-badge">${ch.c}</span>`;
  document.getElementById('mEmoji').textContent=getEmoji(ch.m,ch.c);
  document.getElementById('mBiling').innerHTML=`
    <div class="modal-half">
      <div class="modal-half-label">з®ҖдҪ“еӯ—</div>
      <div class="modal-simp">${ch.s}</div>
    </div>
    <div class="modal-half">
      <div class="modal-half-label">з№Ғй«”еӯ—</div>
      ${same?`<div class="modal-trad-same">дёҺз®ҖдҪ“<br>зӣёеҗҢ</div>`:`<div class="modal-trad">${ch.t}</div>`}
    </div>`;
  document.getElementById('mPin').innerHTML=`<span style="color:${TC[ch.tn]}">${ch.p}</span> <span style="font-size:14px;color:var(--color-text-tertiary)">${toneLabel(ch.tn)}</span>`;
  document.getElementById('mMean').textContent=ch.m;
  document.getElementById('mEx').textContent='дҫӢеҸҘпјҡ'+ch.e;
  const isL=learned.has(ch.s);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'вң… е·ІеӯҰдјҡ':'вӯҗ еӯҰдјҡдәҶ';
  btn.className='btn-learn'+(isL?' done':'');
  document.getElementById('ov').style.display='flex';
}

function closeOv(e){if(!e||e.target.id==='ov'){document.getElementById('ov').style.display='none';selIdx=null;}}

async function toggleL(){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if(learned.has(ch.s))learned.delete(ch.s);else learned.add(ch.s);
  await saveLearned(learned);
  if(gistToken) await syncToGist();
  renderStats();
  renderGrid();
  const isL=learned.has(ch.s);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'вң… е·ІеӯҰдјҡ':'вӯҗ еӯҰдјҡдәҶ';
  btn.className='btn-learn'+(isL?' done':'');
}

function speak(){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(ch.s);
    u.lang='zh-CN';u.rate=0.7;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
}

initStorage();
</script>
</body>
</html>
