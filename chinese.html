<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字乐园 - 汉字学习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #6366F1;
  --color-primary-light: #EEEDFE;
  --color-primary-dark: #4F46E5;
  --color-success: #10B981;
  --color-success-light: #D1FAE5;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F3F4F6;
  --color-background-tertiary: #F9FAFB;
  --color-border-primary: #E5E7EB;
  --color-border-secondary: #D1D5DB;
  --color-border-tertiary: #E5E7EB;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-serif: 'Noto Serif TC', serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  justify-content: center;
}

.nav-tab {
  padding: 8px 24px;
  border-radius: var(--radius-lg);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 2px solid transparent;
}

.nav-tab.chinese {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  box-shadow: var(--shadow-md);
}

.nav-tab.english {
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  border-color: var(--color-border-secondary);
  box-shadow: var(--shadow-sm);
}

.nav-tab.english:hover {
  border-color: #8B5CF6;
  color: #8B5CF6;
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--color-text-primary);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-box {
  border: 1px solid var(--color-border-primary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  font-size: 14px;
  width: 180px;
  outline: none;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.search-box:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
  transform: translateY(-1px);
}

.search-box::placeholder {
  color: var(--color-text-tertiary);
}

.stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.spill {
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 6px 14px;
  font-size: 12px;
  color: var(--color-text-secondary);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border-tertiary);
}

.spill b {
  color: var(--color-primary);
  font-weight: 600;
}

.pgbar {
  flex: 1;
  min-width: 80px;
  height: 6px;
  background: var(--color-background-secondary);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.pgfill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-success), #34D399);
  border-radius: var(--radius-sm);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.cats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.cat {
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  padding: 6px 14px;
  border-radius: var(--radius-lg);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.cat:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.cat.on {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border-color: var(--color-primary);
  box-shadow: var(--shadow-md);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--radius-xl);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  padding: 14px 12px 12px;
  box-shadow: var(--shadow-sm);
}

.card:hover {
  border-color: var(--color-primary);
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-xl);
}

.card.done {
  border-color: var(--color-success);
  background: linear-gradient(135deg, var(--color-success-light) 0%, #ECFDF5 100%);
}

.card.done:hover {
  border-color: var(--color-success);
  box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
}

.done-badge {
  position: absolute;
  top: 8px;
  right: 8px;

  color: #FFFFFF;

  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
}

.biling {
  display: flex;
  gap: 0;
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--color-background-tertiary);
}

.biling-half {
  flex: 1;
  text-align: center;
  padding: 10px 6px 8px;
}

.biling-half:first-child {

}

.biling-label {
  font-size: 10px;
  color: var(--color-text-tertiary);
  letter-spacing: 0.5px;
  margin-bottom: 4px;

}

.simp-char {
  font-size: 36px;
  line-height: 1.1;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--color-text-primary);
  transition: transform 0.2s ease;
}

.card:hover .simp-char {
  transform: scale(1.05);
}

.trad-char {
  font-size: 36px;
  line-height: 1.1;
  font-family: 'Noto Serif TC', serif;
  color: var(--color-primary);
  transition: transform 0.2s ease;
}

.card:hover .trad-char {
  transform: scale(1.05);
}

.same-note {
  font-size: 9px;
  color: var(--color-text-tertiary);
  margin-top: 3px;
}

.card-emoji {
  font-size: 36px;
  text-align: center;
  margin-bottom: 6px;
  line-height: 1;
}

.card-pinyin {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
  text-align: center;
}

.card-meaning {
  font-size: 11px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;

@keyframes fadeIn {

  to { opacity: 1; }

.modal {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--color-border-secondary);
  width: 840px;

  min-height: 700px;

@keyframes slideUp {

    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);

.btn-nav-next {

}

.modal-counter {

  color: var(--color-text-tertiary);

}

.modal {

}

.modal-cat {
  text-align: center;
  margin-bottom: 24px;

.modal-cat-badge {

.modal-biling {

.modal-half {

}

.modal-half:hover {

}

.modal-half:last-child {

.modal-half-label {

}

.modal-trad-same {

}

.modal-pinyin {
  text-align: center;
  font-size: 48px;
  font-weight: 600;
  margin-bottom: 12px;
}

.pinyin-row {
  display: flex;
  align-items: center;
  justify-content: center;

}

.pinyin-label {

}

.modal-meaning {

.modal-example {

  font-family: 'Noto Sans SC', sans-serif;

}

.ex-label {
  font-size: 14px;

}

.ex-text {

}

.ex-btns {

}

.btn-ex-speak {

}

.btn-ex-speak:hover {

}

.btn-ex-speak-yue {

}

.btn-ex-speak-yue:hover {

}

.modal-btns {

}

.btn-speak {
  flex: 0 0 auto;

  .modal-simp, .modal-trad {

<body>

<div id="app">
  <div class="nav-tabs">
    <div class="nav-tab chinese">📝 汉字学习</div>
    <div class="nav-tab english" onclick="window.location.href='english.html'">🔤 单词学习</div>
  </div>
  <div class="header">
    <h1>🍎 汉字乐园</h1>
    <input class="search-box" id="sb" placeholder="🔍 搜索..." oninput="doFilter()">
     <button class="cat" id="btnDiff" onclick="toggleDiffOnly()">🔄 全部</button>
    <button class="cat" onclick="setGistConfig()">⚙️ 配置</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="ov" style="display:none" onclick="closeOv(event)">
  <div class="modal" id="modal">
    <button class="btn-nav btn-nav-prev" onclick="prevItem()">‹</button>
    <button class="btn-nav btn-nav-next" onclick="nextItem()">›</button>
    <div class="modal-cat" id="mCat"></div>
    <div class="modal-emoji" id="mEmoji"></div>
    <div class="modal-biling" id="mBiling"></div>
    <div class="modal-pinyin" id="mPin"></div>
    <div class="modal-meaning" id="mMean"></div>
    <div class="modal-example" id="mEx"></div>
    <div class="modal-btns">
      <button class="btn-speak" onclick="speak('zh-CN')" title="普通话">🔊普</button>
      <button class="btn-speak btn-speak-yue" onclick="speak('yue')" title="粤语">🔊粤</button>
      <button class="btn-learn" id="btnL" onclick="toggleL()">⭐ 学会了</button>
      <button class="btn-close" onclick="closeOv()">关闭</button>
    </div>
    <div class="modal-counter" id="mCounter"></div>
  </div>
</div>

<script src="raw_data.js"></script>
<script>
const TC={1:'#EF4444',2:'#10B981',3:'#F59E0B',4:'#3B82F6',5:'#9CA3AF'};
const CATS=['全部','数字','家人','身体','动物','植物','颜色','食物','自然','动作','方位','时间','形容','文具','学习','交通工具','天气','情感','职业','物品','建筑','服装','水果','蔬菜','家具','电器','节日','运动','乐器','疾病'];

const seen=new Set(), CHARS=[];
for(const d of RAW){if(!seen.has(d.s)){seen.add(d.s);CHARS.push(d);}}

let curCat='全部', learned=new Set(), selIdx=null, sq='', showDiffOnly=false;
let gistToken = localStorage.getItem('gistToken') || '';
let gistId = localStorage.getItem('gistId') || '';

const DB_NAME = 'ChineseCharDB';
const DB_VERSION = 1;
const STORE_NAME = 'learnedChars';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
  });
}

async function loadLearned() {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get('learned');
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        const data = request.result;
        if (data && data.chars) {
          resolve(new Set(data.chars));
        } else {
          const localStorageData = localStorage.getItem('lc3');
          if (localStorageData) {
            const lsSet = new Set(JSON.parse(localStorageData));
            saveLearned(lsSet);
            resolve(lsSet);
          } else {
            resolve(new Set());
          }
        }
      };
    });
  } catch (e) {
    const localStorageData = localStorage.getItem('lc3');
    return localStorageData ? new Set(JSON.parse(localStorageData)) : new Set();
  }
}

async function saveLearned(charsSet) {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put({ chars: [...charsSet] }, 'learned');
    transaction.oncomplete = () => {
      localStorage.setItem('lc3', JSON.stringify([...charsSet]));
    };
    transaction.onerror = () => {
      localStorage.setItem('lc3', JSON.stringify([...charsSet]));
    };
  } catch (e) {
    localStorage.setItem('lc3', JSON.stringify([...charsSet]));
  }
}

function exportData() {
  const data = {
    learned: [...learned],
    exportTime: new Date().toISOString(),
    version: '1.0'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `汉字学习进度_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.learned && Array.isArray(data.learned)) {
        learned = new Set(data.learned);
        await saveLearned(learned);
        if (gistToken) await syncToGist();
        renderStats();
        renderGrid();
        alert('导入成功！已导入 ' + data.learned.length + ' 个已学汉字');
      } else {
        alert('无效的导入文件');
      }
    } catch (e) {
      alert('导入失败：' + e.message);
    }
  };
  reader.readAsText(file);
}

function setGistConfig() {
  const token = prompt('请输入 GitHub Personal Access Token:\n\n获取方式：https://github.com/settings/tokens\n需要勾选 gist 权限', gistToken);
  if (token === null) return;
  
  if (token.trim()) {
    gistToken = token.trim();
    localStorage.setItem('gistToken', gistToken);
    
    const existingGistId = prompt('请输入已有的 Gist ID（可选，留空则创建新Gist）:', gistId);
    if (existingGistId !== null) {
      if (existingGistId.trim()) {
        gistId = existingGistId.trim();
        localStorage.setItem('gistId', gistId);
      } else {
        gistId = '';
        localStorage.removeItem('gistId');
      }
    }
    
    alert('配置已保存！下次同步时将使用 GitHub Gist');
  } else {
    gistToken = '';
    localStorage.removeItem('gistToken');
    alert('已清除 GitHub Gist 配置');
  }
}

async function syncToGist() {
  if (!gistToken) {
    alert('请先配置 GitHub Token');
    return;
  }
  
  const data = {
    learned: [...learned],
    exportTime: new Date().toISOString(),
    version: '1.0'
  };
  
  const gistData = {
    description: '汉字乐园 - 学习进度备份',
    public: false,
    files: {
      'chinese_chars_progress.json': {
        content: JSON.stringify(data, null, 2)
      }
    }
  };
  
  try {
    const url = gistId 
      ? `https://api.github.com/gists/${gistId}`
      : 'https://api.github.com/gists';
    
    const method = gistId ? 'PATCH' : 'POST';
    
    const response = await fetch(url, {
      method,
      headers: {
        'Authorization': `token ${gistToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(gistData)
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    const result = await response.json();
    if (!gistId) {
      gistId = result.id;
      localStorage.setItem('gistId', gistId);
    }
    
  } catch (e) {
    alert(`❌ 同步失败：${e.message}`);
  }
}

async function syncFromGist() {
  if (!gistToken) {
    alert('请先配置 GitHub Token');
    return;
  }
  
  if (!gistId) {
    alert('请先配置 Gist ID 或先同步一次创建 Gist');
    return;
  }
  
  try {
    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: {
        'Authorization': `token ${gistToken}`
      }
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    const gist = await response.json();
    const content = gist.files['chinese_chars_progress.json']?.content;
    
    if (!content) {
      throw new Error('Gist 中未找到学习进度文件');
    }
    
    const data = JSON.parse(content);
    if (data.learned && Array.isArray(data.learned)) {
      learned = new Set(data.learned);
      await saveLearned(learned);
      renderStats();
      renderGrid();
    } else {
      alert('Gist 中的数据格式无效');
    }
  } catch (e) {
    alert(`❌ 同步失败：${e.message}`);
  }
}

function toneLabel(t){return{1:'一声',2:'二声',3:'三声',4:'四声',5:'轻声'}[t]||'';}

function renderStats(){
  const list=getList();
  const tot=list.length;
  const done=list.filter(ch=>learned.has(ch.s)).length;
  const pct=tot>0?Math.round(done/tot*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="spill">已学 <b>${done}</b> 字</div>
    <div class="spill">共 <b>${tot}</b> 字</div>
    <div class="spill">完成 <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function getCatCount(cat) {
  return CHARS.filter(ch => {
    const co = cat === '全部' || ch.c === cat;
    const qo = !sq || ch.s.includes(sq) || ch.t.includes(sq) || ch.p.toLowerCase().includes(sq.toLowerCase()) || ch.m.includes(sq);
    const dof = !showDiffOnly || ch.s !== ch.t;
    return co && qo && dof;
  }).length;
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    `<button class="cat${c===curCat?' on':''}" onclick="setCat('${c}')">${c} <span style="font-size:11px;opacity:0.7">[${getCatCount(c)}]</span></button>`
  ).join('');
}

function setCat(c){curCat=c;renderCats();renderGrid();}
function doFilter(){sq=document.getElementById('sb').value.trim();renderCats();renderGrid();}

function toggleDiffOnly(){
  showDiffOnly=!showDiffOnly;
  const btn=document.getElementById('btnDiff');
  btn.className='cat'+(showDiffOnly?' on':'');
  btn.textContent=showDiffOnly?'🔄 繁简不同':'🔄 全部';
  renderCats();
  renderGrid();
}

function getList(){
  return CHARS.filter(ch=>{
    const co=curCat==='全部'||ch.c===curCat;
    const qo=!sq||ch.s.includes(sq)||ch.t.includes(sq)||ch.p.toLowerCase().includes(sq.toLowerCase())||ch.m.includes(sq);
    const dof=!showDiffOnly||ch.s!==ch.t;
    return co&&qo&&dof;
  });
}

function renderGrid(){
  const list=getList();
  if(!list.length){document.getElementById('grid').innerHTML=`<div class="empty">没有找到「${sq}」相关汉字</div>`;return;}
  document.getElementById('grid').innerHTML=list.map(ch=>{
    const isL=learned.has(ch.s);
    const same=ch.s===ch.t;
    const emoji=getEmoji(ch.m,ch.c);
    return `<div class="card${isL?' done':''}" onclick="openModal(${CHARS.indexOf(ch)})">
      ${isL?'<span class="done-badge">✓ 学会</span>':''}
      <div class="card-emoji">${emoji}</div>
      <div class="biling">
        <div class="biling-half">
          <div class="biling-label">简体</div>
          <div class="simp-char">${ch.s}</div>
        </div>
        <div class="biling-half">
          <div class="biling-label">繁體</div>
          <div class="trad-char">${ch.t}</div>
          ${same?'<div class="same-note">同简体</div>':''}
        </div>
      </div>
      <div class="card-pinyin" style="color:${TC[ch.tn]}">${ch.p} <span style="font-size:11px;color:var(--color-text-tertiary)">${toneLabel(ch.tn)}</span></div>
      <div class="card-meaning">${ch.m}</div>
    </div>`;
  }).join('');
}

function openModal(idx){
  selIdx=idx;
  const ch=CHARS[idx];
  const same=ch.s===ch.t;
  document.getElementById('mCat').innerHTML=`<span class="modal-cat-badge">${ch.c}</span>`;
  document.getElementById('mEmoji').textContent=getEmoji(ch.m,ch.c);
  document.getElementById('mBiling').innerHTML=`
    <div class="modal-half">
      <div class="modal-half-label">简体字</div>
      <div class="modal-simp">${ch.s}</div>
    </div>
    <div class="modal-half">
      <div class="modal-half-label">繁體字</div>
      ${same?`<div class="modal-trad-same">与简体<br>相同</div>`:`<div class="modal-trad">${ch.t}</div>`}
    </div>`;
  const yueHtml = ch.y ? `<div class="pinyin-row"><span class="pinyin-label">粤</span><span class="pinyin-value">${ch.y}</span></div>` : '';
  document.getElementById('mPin').innerHTML=`
    <div class="pinyin-row"><span class="pinyin-label">普</span><span style="color:${TC[ch.tn]}">${ch.p}</span> <span style="font-size:14px;color:var(--color-text-tertiary)">${toneLabel(ch.tn)}</span></div>
    ${yueHtml}
  `;
  document.getElementById('mMean').textContent=ch.m;
  document.getElementById('mEx').innerHTML=`<div class="ex-label">例句</div><div class="ex-text">${ch.e}</div><div class="ex-btns"><button class="btn-ex-speak" onclick="speakEx('zh-CN')">🔊普</button><button class="btn-ex-speak btn-ex-speak-yue" onclick="speakEx('yue')">🔊粤</button></div>`;
  const isL=learned.has(ch.s);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'✅ 已学会':'⭐ 学会了';
  btn.className='btn-learn'+(isL?' done':'');
  document.getElementById('mCounter').textContent=`${idx+1} / ${CHARS.length}`;
  document.querySelector('.btn-nav-prev').style.opacity=idx===0?'0.3':'1';
  document.querySelector('.btn-nav-next').style.opacity=idx===CHARS.length-1?'0.3':'1';
  document.getElementById('ov').style.display='flex';
}

function prevItem(){
  if(selIdx>0)openModal(selIdx-1);
}

function nextItem(){
  if(selIdx<CHARS.length-1)openModal(selIdx+1);
}

document.addEventListener('keydown',function(e){
  if(document.getElementById('ov').style.display!=='none'){
    if(e.key==='ArrowLeft')prevItem();
    if(e.key==='ArrowRight')nextItem();
    if(e.key==='Escape')closeOv();
  }
});

function closeOv(e){if(!e||e.target.id==='ov'){document.getElementById('ov').style.display='none';selIdx=null;}}

async function toggleL(){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if(learned.has(ch.s))learned.delete(ch.s);else learned.add(ch.s);
  await saveLearned(learned);
  if(gistToken) await syncToGist();
  renderStats();
  renderGrid();
  const isL=learned.has(ch.s);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'✅ 已学会':'⭐ 学会了';
  btn.className='btn-learn'+(isL?' done':'');
}

function getVoice(lang){
  const voices=speechSynthesis.getVoices();
  const targetLang=lang==='yue'?'zh-HK':'zh-CN';
  // First try exact match
  let voice=voices.find(v=>v.lang===targetLang);
  // Then try any Chinese variant
  if(!voice)voice=voices.find(v=>v.lang.includes('zh'));
  // Then try Chinese without region
  if(!voice)voice=voices.find(v=>v.lang==='zh');
  // Fallback to any available voice
  if(!voice && voices.length>0)voice=voices[0];
  return voice;
}

function speak(lang){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if('speechSynthesis' in window){
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(ch.s);
      u.lang=lang==='yue'?'zh-HK':'zh-CN';
      u.rate=0.9;
      u.pitch=1.0;
      u.volume=1.0;
      const voice=getVoice(lang);
      if(voice){
        u.voice=voice;
        u.voiceURI=voice.voiceURI;
      }
      speechSynthesis.speak(u);
    }catch(e){console.log('Speech error:',e);}
  }
}

function speakEx(lang){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if('speechSynthesis' in window){
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(ch.e);
      u.lang=lang==='yue'?'zh-HK':'zh-CN';
      u.rate=0.85;
      u.pitch=1.0;
      u.volume=1.0;
      const voice=getVoice(lang);
      if(voice){
        u.voice=voice;
        u.voiceURI=voice.voiceURI;
      }
      speechSynthesis.speak(u);
    }catch(e){console.log('Speech error:',e);}
  }
}

// Preload voices and wait for them to load
if('speechSynthesis' in window){
  const loadVoices=()=>speechSynthesis.getVoices();
  loadVoices();
  if(speechSynthesis.onvoiceschanged===undefined){
    speechSynthesis.onvoiceschanged=loadVoices;
  }
  // Some browsers need a delay to load voices
  setTimeout(loadVoices,100);
}
