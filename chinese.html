<script>
const TC={1:'#EF4444',2:'#10B981',3:'#F59E0B',4:'#3B82F6',5:'#9CA3AF'};
const CATS=['全部','数字','家人','身体','动物','植物','颜色','食物','自然','动作','方位','时间','形容','文具','学习','交通工具','天气','情感','职业','物品','建筑','服装','水果','蔬菜','家具','电器','节日','运动','乐器','疾病'];

const seen=new Set(), CHARS=[];
for(const d of RAW){if(!seen.has(d.s)){seen.add(d.s);CHARS.push(d);}}

let curCat='全部', learned=new Set(), selIdx=null, sq='';
let gistToken = localStorage.getItem('gistToken') || '';
let gistId = localStorage.getItem('gistId') || '';

const DB_NAME = 'ChineseCharDB';
const DB_VERSION = 1;
const STORE_NAME = 'learnedChars';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
  });
}

async function loadLearned() {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get('learned');
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        const data = request.result;
        if (data && data.chars) {
          resolve(new Set(data.chars));
        } else {
          const localStorageData = localStorage.getItem('lc3');
          if (localStorageData) {
            const lsSet = new Set(JSON.parse(localStorageData));
            saveLearned(lsSet);
            resolve(lsSet);
          } else {
            resolve(new Set());
          }
        }
      };
    });
  } catch (e) {
    const localStorageData = localStorage.getItem('lc3');
    return localStorageData ? new Set(JSON.parse(localStorageData)) : new Set();
  }
}

async function saveLearned(charsSet) {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put({ chars: [...charsSet] }, 'learned');
    transaction.oncomplete = () => {
      localStorage.setItem('lc3', JSON.stringify([...charsSet]));
    };
    transaction.onerror = () => {
      localStorage.setItem('lc3', JSON.stringify([...charsSet]));
    };
  } catch (e) {
    localStorage.setItem('lc3', JSON.stringify([...charsSet]));
  }
}

function exportData() {
  const data = {
    learned: [...learned],
    exportTime: new Date().toISOString(),
    version: '1.0'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `汉字学习进度_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.learned && Array.isArray(data.learned)) {
        learned = new Set(data.learned);
        await saveLearned(learned);
        if (gistToken) await syncToGist();
        renderStats();
        renderGrid();
        alert('导入成功！已导入 ' + data.learned.length + ' 个已学汉字');
      } else {
        alert('无效的导入文件');
      }
    } catch (e) {
      alert('导入失败：' + e.message);
    }
  };
  reader.readAsText(file);
}

function setGistConfig() {
  const token = prompt('请输入 GitHub Personal Access Token:\n\n获取方式：https://github.com/settings/tokens\n需要勾选 gist 权限', gistToken);
  if (token === null) return;
  
  if (token.trim()) {
    gistToken = token.trim();
    localStorage.setItem('gistToken', gistToken);
    
    const existingGistId = prompt('请输入已有的 Gist ID（可选，留空则创建新Gist）:', gistId);
    if (existingGistId !== null) {
      if (existingGistId.trim()) {
        gistId = existingGistId.trim();
        localStorage.setItem('gistId', gistId);
      } else {
        gistId = '';
        localStorage.removeItem('gistId');
      }
    }
    
    alert('配置已保存！下次同步时将使用 GitHub Gist');
  } else {
    gistToken = '';
    localStorage.removeItem('gistToken');
    alert('已清除 GitHub Gist 配置');
  }
}

async function syncToGist() {
  if (!gistToken) {
    alert('请先配置 GitHub Token');
    return;
  }
  
  const data = {
    learned: [...learned],
    exportTime: new Date().toISOString(),
    version: '1.0'
  };
  
  const gistData = {
    description: '汉字乐园 - 学习进度备份',
    public: false,
    files: {
      'chinese_chars_progress.json': {
        content: JSON.stringify(data, null, 2)
      }
    }
  };
  
  try {
    const url = gistId 
      ? `https://api.github.com/gists/${gistId}`
      : 'https://api.github.com/gists';
    
    const method = gistId ? 'PATCH' : 'POST';
    
    const response = await fetch(url, {
      method,
      headers: {
        'Authorization': `token ${gistToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(gistData)
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    const result = await response.json();
    if (!gistId) {
      gistId = result.id;
      localStorage.setItem('gistId', gistId);
    }
    
    alert(`✅ 同步成功！\nGist ID: ${gistId}`);
  } catch (e) {
    alert(`❌ 同步失败：${e.message}`);
  }
}

async function syncFromGist() {
  if (!gistToken) {
    alert('请先配置 GitHub Token');
    return;
  }
  
  if (!gistId) {
    alert('请先配置 Gist ID 或先同步一次创建 Gist');
    return;
  }
  
  try {
    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: {
        'Authorization': `token ${gistToken}`
      }
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    const gist = await response.json();
    const content = gist.files['chinese_chars_progress.json']?.content;
    
    if (!content) {
      throw new Error('Gist 中未找到学习进度文件');
    }
    
    const data = JSON.parse(content);
    if (data.learned && Array.isArray(data.learned)) {
      learned = new Set(data.learned);
      await saveLearned(learned);
      renderStats();
      renderGrid();
      alert(`✅ 从 Gist 同步成功！\n已加载 ${data.learned.length} 个已学汉字`);
    } else {
      alert('Gist 中的数据格式无效');
    }
  } catch (e) {
    alert(`❌ 同步失败：${e.message}`);
  }
}

async function initStorage() {
  learned = await loadLearned();
  renderStats();
  renderCats();
  renderGrid();
}

function toneLabel(t){return{1:'一声',2:'二声',3:'三声',4:'四声',5:'轻声'}[t]||'';}

function renderStats(){
  const tot=CHARS.length,done=[...learned].length,pct=Math.round(done/tot*100);
  document.getElementById('stats').innerHTML=`
    <div class="spill">已学 <b>${done}</b> 字</div>
    <div class="spill">共 <b>${tot}</b> 字</div>
    <div class="spill">完成 <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function getCatCount(cat) {
  if (cat === '全部') return CHARS.length;
  return CHARS.filter(ch => ch.c === cat).length;
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    `<button class="cat${c===curCat?' on':''}" onclick="setCat('${c}')">${c} <span style="font-size:11px;opacity:0.7">[${getCatCount(c)}]</span></button>`
  ).join('');
}

function setCat(c){curCat=c;renderCats();renderGrid();}
function doFilter(){sq=document.getElementById('sb').value.trim();renderGrid();}

function getList(){
  return CHARS.filter(ch=>{
    const co=curCat==='全部'||ch.c===curCat;
    const qo=!sq||ch.s.includes(sq)||ch.t.includes(sq)||ch.p.toLowerCase().includes(sq.toLowerCase())||ch.m.includes(sq);
    return co&&qo;
  });
}

function renderGrid(){
  const list=getList();
  if(!list.length){document.getElementById('grid').innerHTML=`<div class="empty">没有找到「${sq}」相关汉字</div>`;return;}
  document.getElementById('grid').innerHTML=list.map(ch=>{
    const isL=learned.has(ch.s);
    const same=ch.s===ch.t;
    return `<div class="card${isL?' done':''}" onclick="openModal(${CHARS.indexOf(ch)})">
      ${isL?'<span class="done-badge">✓ 学会</span>':''}
      <div class="biling">
        <div class="biling-half">
          <div class="biling-label">简体</div>
          <div class="simp-char">${ch.s}</div>
        </div>
        <div class="biling-half">
          <div class="biling-label">繁體</div>
          <div class="trad-char">${ch.t}</div>
          ${same?'<div class="same-note">同简体</div>':''}
        </div>
      </div>
      <div class="card-pinyin" style="color:${TC[ch.tn]}">${ch.p} <span style="font-size:11px;color:var(--color-text-tertiary)">${toneLabel(ch.tn)}</span></div>
      <div class="card-meaning">${ch.m}</div>
    </div>`;
  }).join('');
}

function openModal(idx){
  selIdx=idx;
  const ch=CHARS[idx];
  const same=ch.s===ch.t;
  document.getElementById('mCat').innerHTML=`<span class="modal-cat-badge">${ch.c}</span>`;
  document.getElementById('mBiling').innerHTML=`
    <div class="modal-half">
      <div class="modal-half-label">简体字</div>
      <div class="modal-simp">${ch.s}</div>
    </div>
    <div class="modal-half">
      <div class="modal-half-label">繁體字</div>
      ${same?`<div class="modal-trad-same">与简体<br>相同</div>`:`<div class="modal-trad">${ch.t}</div>`}
    </div>`;
  document.getElementById('mPin').innerHTML=`<span style="color:${TC[ch.tn]}">${ch.p}</span> <span style="font-size:14px;color:var(--color-text-tertiary)">${toneLabel(ch.tn)}</span>`;
  document.getElementById('mMean').textContent=ch.m;
  document.getElementById('mEx').textContent='例句：'+ch.e;
  const isL=learned.has(ch.s);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'✅ 已学会':'⭐ 学会了';
  btn.className='btn-learn'+(isL?' done':'');
  document.getElementById('ov').style.display='flex';
}

function closeOv(e){if(!e||e.target.id==='ov'){document.getElementById('ov').style.display='none';selIdx=null;}}

async function toggleL(){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if(learned.has(ch.s))learned.delete(ch.s);else learned.add(ch.s);
  await saveLearned(learned);
  if(gistToken) await syncToGist();
  renderStats();
  renderGrid();
  const isL=learned.has(ch.s);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'✅ 已学会':'⭐ 学会了';
  btn.className='btn-learn'+(isL?' done':'');
}

function speak(){
  if(selIdx===null)return;
  const ch=CHARS[selIdx];
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(ch.s);
    u.lang='zh-CN';u.rate=0.7;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
}

initStorage();
</script>
