<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自然拼读乐园 - Phonics 学习</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #F97316;
  --color-primary-light: #FFF7ED;
  --color-primary-dark: #EA580C;
  --color-success: #10B981;
  --color-success-light: #D1FAE5;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F3F4F6;
  --color-background-tertiary: #F9FAFB;
  --color-border-primary: #E5E7EB;
  --color-border-secondary: #D1D5DB;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, #F8FAFC 0%, #FFF7ED 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  justify-content: flex-start;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}

.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 8px 16px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  flex-shrink: 0;
  border: 2px solid transparent;
}

.nav-tab.other {
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  border-color: var(--color-border-secondary);
  box-shadow: var(--shadow-sm);
}

.nav-tab.other:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.nav-tab.active {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  box-shadow: var(--shadow-md);
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--color-text-primary);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-box {
  border: 1px solid var(--color-border-primary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  font-size: 14px;
  width: 180px;
  outline: none;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.search-box:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
  transform: translateY(-1px);
}

.search-box::placeholder {
  color: var(--color-text-tertiary);
}

.stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.spill {
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 6px 14px;
  font-size: 12px;
  color: var(--color-text-secondary);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border-primary);
}

.spill b {
  color: var(--color-primary);
  font-weight: 600;
}

.pgbar {
  flex: 1;
  min-width: 80px;
  height: 6px;
  background: var(--color-background-secondary);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.pgfill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), #FDBA74);
  border-radius: var(--radius-sm);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.cats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.cat {
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  padding: 6px 14px;
  border-radius: var(--radius-lg);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.cat:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.cat.on {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border-color: var(--color-primary);
  box-shadow: var(--shadow-md);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-primary);
  border-radius: var(--radius-xl);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  padding: 14px 12px 12px;
  box-shadow: var(--shadow-sm);
}

.card:hover {
  border-color: var(--color-primary);
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-xl);
}

.card.done {
  border-color: var(--color-success);
  background: linear-gradient(135deg, var(--color-success-light) 0%, #ECFDF5 100%);
}

.card.done:hover {
  border-color: var(--color-success);
  box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
}

.done-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
  color: #FFFFFF;
  border-radius: var(--radius-md);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
}

.card-emoji {
  font-size: 40px;
  text-align: center;
  margin-bottom: 6px;
  line-height: 1;
}

.card-word {
  font-size: 26px;
  font-weight: 700;
  color: var(--color-primary-dark);
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}

.card-phonetic {
  font-size: 13px;
  color: var(--color-text-tertiary);
  text-align: center;
  font-style: italic;
  margin-bottom: 8px;
}

.card-meaning {
  font-size: 11px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--color-border-secondary);
  width: 840px;
  max-width: 96vw;
  padding: 3rem 3.5rem 2.5rem;
  min-height: 640px;
  box-shadow: var(--shadow-xl);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.btn-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-md);
  color: var(--color-text-primary);
}

.btn-nav:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
  transform: translateY(-50%) scale(1.1);
}

.btn-nav-prev { left: -24px; }
.btn-nav-next { right: -24px; }

.modal-counter {
  text-align: center;
  font-size: 14px;
  color: var(--color-text-tertiary);
  margin-top: 16px;
}

.modal-cat {
  text-align: center;
  margin-bottom: 20px;
}

.modal-cat-badge {
  display: inline-block;
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
  border-radius: var(--radius-md);
  font-size: 22px;
  font-weight: 500;
  padding: 6px 24px;
}

.modal-emoji {
  font-size: 72px;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1;
}

.modal-word {
  font-size: 82px;
  font-weight: 700;
  color: var(--color-primary-dark);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.modal-phonetic-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}

.modal-phonetic {
  font-size: 30px;
  color: var(--color-text-tertiary);
  font-style: italic;
}

.modal-meaning {
  text-align: center;
  font-size: 26px;
  color: var(--color-text-secondary);
  margin-bottom: 20px;
}

.modal-key {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: var(--color-primary-light);
  border-radius: var(--radius-md);
  padding: 14px 20px;
  margin-bottom: 16px;
}

.modal-key-emoji { font-size: 40px; line-height: 1; }
.modal-key-word { font-size: 30px; font-weight: 700; color: var(--color-primary-dark); }
.modal-key-word b { color: var(--color-primary); text-decoration: underline; }
.modal-key-zh { font-size: 18px; color: var(--color-text-secondary); }

.modal-words {
  text-align: center;
  font-size: 18px;
  color: var(--color-text-secondary);
  margin-bottom: 16px;
  line-height: 1.6;
}
.modal-words span { color: var(--color-text-primary); font-weight: 500; margin: 0 4px; }

.modal-example {
  background: var(--color-background-secondary);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin-bottom: 28px;
}

.modal-example-en {
  font-size: 22px;
  color: var(--color-text-primary);
  text-align: center;
  margin-bottom: 8px;
  font-weight: 500;
}

.modal-example-zh {
  font-size: 16px;
  color: var(--color-text-secondary);
  text-align: center;
}

.ex-btns {
  display: flex;
  justify-content: center;
  margin: 8px 0;
}

.btn-ex-speak {
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--radius-sm);
  background: var(--color-background-primary);
  color: var(--color-primary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-ex-speak:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
}

.modal-btns {
  display: flex;
  gap: 16px;
}

.btn-speak {
  flex: 0 0 auto;
  border: 2px solid #FDBA74;
  color: var(--color-primary-dark);
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 18px 24px;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
  white-space: nowrap;
}

.btn-speak:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-learn {
  flex: 1;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-md);
  padding: 18px;
  font-size: 24px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.btn-learn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.btn-learn.done {
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
}

.btn-close {
  flex: 0 0 auto;
  border: 2px solid var(--color-border-secondary);
  color: var(--color-text-secondary);
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 18px 24px;
  font-size: 22px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-close:hover {
  border-color: var(--color-text-tertiary);
  color: var(--color-text-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.empty {
  color: var(--color-text-tertiary);
  font-size: 15px;
  padding: 3rem 2rem;
  text-align: center;
  grid-column: 1/-1;
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px dashed var(--color-border-primary);
}

@media (max-width: 480px) {
  #app { padding: 1rem 0.75rem 2rem; }
  .nav-tabs {
    flex-wrap: nowrap;
    justify-content: flex-start;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 7px 14px;
    font-size: 13px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .header h1 { font-size: 18px; }
  .search-box { width: 100%; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .modal {
    width: 100vw;
    max-width: 100vw;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
    padding: 1rem 0.75rem 1.5rem;
    min-height: unset;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
  }
  .modal-emoji { font-size: 48px; }
  .modal-word { font-size: 56px; }
  .modal-phonetic { font-size: 20px; }
  .modal-meaning { font-size: 18px; }
  .modal-key-word { font-size: 22px; }
  .modal-key-emoji { font-size: 30px; }
  .btn-nav { width: 40px; height: 40px; font-size: 24px; }
  .btn-nav-prev { left: 8px; }
  .btn-nav-next { right: 8px; }
  .modal-cat-badge { font-size: 16px; padding: 4px 16px; }
  .modal-btns { gap: 8px; margin-top: 16px; }
  .btn-speak, .btn-learn, .btn-close { padding: 12px 16px; font-size: 15px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="nav-tabs">
    <div class="nav-tab other" onclick="window.location.href='chinese.html'">📝 汉字学习</div>
    <div class="nav-tab other" onclick="window.location.href='english.html'">🔤 单词学习</div>
    <div class="nav-tab other" onclick="window.location.href='pinyin.html'">🈶 拼音学习</div>
    <div class="nav-tab active">🔠 自然拼读</div>
    <div class="nav-tab other" onclick="window.location.href='game.html'">🎮 趣味游戏</div>
    <div class="nav-tab other" onclick="window.location.href='math_addition.html'">➕ 加法思路</div>
    <div class="nav-tab other" onclick="window.location.href='math_subtraction.html'">➖ 减法思路</div>
    <div class="nav-tab other" onclick="window.location.href='math_vocab.html'">🔢 数字词汇</div>
  </div>
  <div class="header">
    <h1>🔠 自然拼读乐园</h1>
    <input class="search-box" id="sb" placeholder="🔍 搜索字母 / 例词..." oninput="doFilter()">
  </div>
  <div class="stats" id="stats"></div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="ov" style="display:none" onclick="closeOv(event)">
  <div class="modal" id="modal">
    <button class="btn-nav btn-nav-prev" onclick="prevItem()">‹</button>
    <button class="btn-nav btn-nav-next" onclick="nextItem()">›</button>
    <div class="modal-cat" id="mCat"></div>
    <div class="modal-emoji" id="mEmoji"></div>
    <div class="modal-word" id="mWord"></div>
    <div class="modal-phonetic-row">
      <span class="modal-phonetic" id="mPhonetic"></span>
    </div>
    <div class="modal-meaning" id="mMean"></div>
    <div class="modal-key" id="mKeyBox">
      <div class="modal-key-emoji" id="mKeyEmoji"></div>
      <div>
        <div class="modal-key-word" id="mKeyWord"></div>
        <div class="modal-key-zh" id="mKeyZh"></div>
      </div>
    </div>
    <div class="modal-words" id="mWords"></div>
    <div class="modal-example">
      <div class="modal-example-en" id="mExEn"></div>
      <div class="ex-btns"><button class="btn-ex-speak" onclick="speakEx()">🔊 读例句</button></div>
      <div class="modal-example-zh" id="mExZh"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-speak" onclick="speak()">🔊 听发音</button>
      <button class="btn-learn" id="btnL" onclick="toggleL()">⭐ 学会了</button>
      <button class="btn-close" onclick="closeOv()">关闭</button>
    </div>
    <div class="modal-counter" id="mCounter"></div>
  </div>
</div>

<script>
// 自然拼读数据
// unit: 字母/字母组合  ipa: 国际音标  type: 分类  zh: 中文说明
// emoji/key/keyZh: 代表词及其中文  words: 例词  example/exampleZh: 例句
const PHONICS = [
  // ===== 字母基本音 =====
  { unit:'a', ipa:'/æ/', type:'字母发音', zh:'字母 a 的短音', emoji:'🍎', key:'apple', keyIpa:'/ˈæpəl/', keyZh:'苹果', words:'apple, ant, cat, hat', example:'The apple is red.', exampleZh:'苹果是红色的。' },
  { unit:'b', ipa:'/b/', type:'字母发音', zh:'字母 b 的音', emoji:'⚽', key:'ball', keyIpa:'/bɔːl/', keyZh:'球', words:'ball, bag, bus, bird', example:'The ball is big.', exampleZh:'球很大。' },
  { unit:'c', ipa:'/k/', type:'字母发音', zh:'字母 c 的音', emoji:'🐱', key:'cat', keyIpa:'/kæt/', keyZh:'猫', words:'cat, cup, car, cake', example:'The cat is cute.', exampleZh:'猫很可爱。' },
  { unit:'d', ipa:'/d/', type:'字母发音', zh:'字母 d 的音', emoji:'🐶', key:'dog', keyIpa:'/dɒɡ/', keyZh:'狗', words:'dog, duck, door, desk', example:'The dog can run.', exampleZh:'狗会跑。' },
  { unit:'e', ipa:'/e/', type:'字母发音', zh:'字母 e 的短音', emoji:'🥚', key:'egg', keyIpa:'/eɡ/', keyZh:'鸡蛋', words:'egg, bed, pen, red', example:'I like the egg.', exampleZh:'我喜欢这个鸡蛋。' },
  { unit:'f', ipa:'/f/', type:'字母发音', zh:'字母 f 的音', emoji:'🐟', key:'fish', keyIpa:'/fɪʃ/', keyZh:'鱼', words:'fish, fan, fox, four', example:'The fish can swim.', exampleZh:'鱼会游泳。' },
  { unit:'g', ipa:'/g/', type:'字母发音', zh:'字母 g 的音', emoji:'🐐', key:'goat', keyIpa:'/ɡoʊt/', keyZh:'山羊', words:'goat, girl, gift, green', example:'The goat is white.', exampleZh:'山羊是白色的。' },
  { unit:'h', ipa:'/h/', type:'字母发音', zh:'字母 h 的音', emoji:'🎩', key:'hat', keyIpa:'/hæt/', keyZh:'帽子', words:'hat, hand, hen, home', example:'I have a hat.', exampleZh:'我有一顶帽子。' },

const SOUND_MAP = {
  '/æ/':'ahhh', '/b/':'buh',  '/k/':'kuh',  '/d/':'duh',
  '/e/':'ehhh', '/f/':'fff',  '/g/':'guh',  '/h/':'huh',
  '/ɪ/':'ihhh', '/dʒ/':'juh', '/l/':'lll',  '/m/':'mmm',
  '/n/':'nnn',  '/ɒ/':'awhh', '/p/':'puh',  '/kw/':'kwuh',
  '/r/':'rrr',  '/s/':'sss',  '/t/':'tuh',  '/ʌ/':'uhhh',
  '/v/':'vvv',  '/w/':'wuh',  '/ks/':'ksss', '/j/':'yuh',
  '/z/':'zzz',
  '/eɪ/':'ayyy','/aɪ/':'eye',  '/oʊ/':'ohhh', '/juː/':'yooo',
  '/ʃ/':'shhh', '/tʃ/':'chuh', '/θ/':'thhh',  '/ð/':'thhh',
  '/ŋ/':'nggg',
  '/iː/':'eeee','/uː/':'oohh', '/ʊ/':'oooh',  '/aʊ/':'owww',
  '/ɔɪ/':'oyyy','/ɔː/':'awww',
  '/ɑːr/':'arrr','/ɔːr/':'orrr','/ɜːr/':'urrr',
  '/bl/':'bluh','/br/':'bruh','/kl/':'kluh','/kr/':'kruh',
  '/dr/':'druh','/fl/':'fluh','/fr/':'fruh','/gl/':'gluh',
  '/gr/':'gruh','/pl/':'pluh','/pr/':'pruh','/sl/':'sluh',
  '/sm/':'smuh','/sn/':'snuh','/sp/':'spuh','/st/':'stuh',
  '/sw/':'swuh','/tr/':'truh',
  '/ld/':'old','/lk/':'ulk','/lp/':'ulp','/lt/':'ult','/lf/':'ulf'
};

const CATS = ['全部', ...new Set(PHONICS.map(p => p.type))];

let curCat = '全部', learned = new Set(), selIdx = null, sq = '';

const DB_NAME = 'PhonicsDB';
const DB_VERSION = 1;
const STORE_NAME = 'learnedPhonics';

// 每条唯一 key（unit 可能重复，如 a / th / oo / ow，需带 ipa 区分）
function itemKey(p) { return p.unit + '|' + p.ipa; }

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
  });
}

async function loadLearned() {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get('learned');
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        const data = request.result;
        if (data && data.items) {
          resolve(new Set(data.items));
        } else {
          const ls = localStorage.getItem('phl1');
          if (ls) {
            const lsSet = new Set(JSON.parse(ls));
            saveLearned(lsSet);
            resolve(lsSet);
          } else {
            resolve(new Set());
          }
        }
      };
    });
  } catch (e) {
    const ls = localStorage.getItem('phl1');
    return ls ? new Set(JSON.parse(ls)) : new Set();
  }
}

async function saveLearned(itemsSet) {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put({ items: [...itemsSet] }, 'learned');
    transaction.oncomplete = () => { localStorage.setItem('phl1', JSON.stringify([...itemsSet])); };
    transaction.onerror = () => { localStorage.setItem('phl1', JSON.stringify([...itemsSet])); };
  } catch (e) {
    localStorage.setItem('phl1', JSON.stringify([...itemsSet]));
  }
}

async function initStorage() {
  learned = await loadLearned();
  renderStats();
  renderCats();
  renderGrid();
}

function renderStats() {
  const list = getList();
  const tot = list.length;
  const done = list.filter(p => learned.has(itemKey(p))).length;
  const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="spill">已学 <b>${done}</b> 个</div>
    <div class="spill">共 <b>${tot}</b> 个</div>
    <div class="spill">完成 <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function matchQuery(p) {
  if (!sq) return true;
  const s = sq.toLowerCase();
  return p.unit.toLowerCase().includes(s) || p.key.toLowerCase().includes(s)
    || p.words.toLowerCase().includes(s) || p.zh.includes(sq) || p.keyZh.includes(sq);
}

function getCatCount(cat) {
  return PHONICS.filter(p => (cat === '全部' || p.type === cat) && matchQuery(p)).length;
}

function renderCats() {
  document.getElementById('cats').innerHTML = CATS.map(c =>
    `<button class="cat${c === curCat ? ' on' : ''}" onclick="setCat('${c}')">${c} <span style="font-size:11px;opacity:0.7">[${getCatCount(c)}]</span></button>`
  ).join('');
}

function setCat(c) { curCat = c; renderCats(); renderGrid(); }
function doFilter() { sq = document.getElementById('sb').value.trim(); renderCats(); renderGrid(); }

function getList() {
  return PHONICS.filter(p => (curCat === '全部' || p.type === curCat) && matchQuery(p));
}

function renderGrid() {
  const list = getList();
  if (!list.length) { document.getElementById('grid').innerHTML = `<div class="empty">没有找到「${sq}」相关内容</div>`; return; }
  document.getElementById('grid').innerHTML = list.map(p => {
    const isL = learned.has(itemKey(p));
    return `<div class="card${isL ? ' done' : ''}" onclick="openModal(${PHONICS.indexOf(p)})">
      ${isL ? '<span class="done-badge">✓ 学会</span>' : ''}
      <div class="card-emoji">${p.emoji}</div>
      <div class="card-word">${p.unit}</div>
      <div class="card-phonetic">${p.ipa}</div>
      <div class="card-meaning">${p.zh}</div>
    </div>`;
  }).join('');
}

// 例词里高亮代表词中含目标字母组合（简单展示）
function highlightKey(word, unit) {
  const u = unit.replace('_', '');
  const idx = word.toLowerCase().indexOf(u.toLowerCase());
  if (idx < 0 || unit.includes('_')) return word;
  return word.slice(0, idx) + '<b>' + word.slice(idx, idx + u.length) + '</b>' + word.slice(idx + u.length);
}

function openModal(idx) {
  selIdx = idx;
  const p = PHONICS[idx];
  document.getElementById('mCat').innerHTML = `<span class="modal-cat-badge">${p.type}</span>`;
  document.getElementById('mEmoji').textContent = p.emoji;
  document.getElementById('mWord').textContent = p.unit;
  document.getElementById('mPhonetic').textContent = p.ipa;
  document.getElementById('mMean').textContent = p.zh + (p.hint ? ' · ' + p.hint : '');
  document.getElementById('mKeyEmoji').textContent = p.emoji;
  document.getElementById('mKeyWord').innerHTML = highlightKey(p.key, p.unit);
  document.getElementById('mKeyZh').textContent = p.keyZh + (p.keyIpa ? ' ' + p.keyIpa : '');
  document.getElementById('mWords').innerHTML = '例词：' + p.words.split(',').map(w => `<span>${w.trim()}</span>`).join('');
  document.getElementById('mExEn').textContent = p.example || '';
  document.getElementById('mExZh').textContent = p.exampleZh || '';
  const isL = learned.has(itemKey(p));
  const btn = document.getElementById('btnL');
  btn.textContent = isL ? '✅ 已学会' : '⭐ 学会了';
  btn.className = 'btn-learn' + (isL ? ' done' : '');
  document.getElementById('mCounter').textContent = `${idx + 1} / ${PHONICS.length}`;
  document.querySelector('.btn-nav-prev').style.opacity = idx === 0 ? '0.3' : '1';
  document.querySelector('.btn-nav-next').style.opacity = idx === PHONICS.length - 1 ? '0.3' : '1';
  document.getElementById('ov').style.display = 'flex';
}

function prevItem() { if (selIdx > 0) openModal(selIdx - 1); }
function nextItem() { if (selIdx < PHONICS.length - 1) openModal(selIdx + 1); }

document.addEventListener('keydown', function (e) {
  if (document.getElementById('ov').style.display !== 'none') {
    if (e.key === 'ArrowLeft') prevItem();
    if (e.key === 'ArrowRight') nextItem();
    if (e.key === 'Escape') closeOv();
  }
});

function closeOv(e) { if (!e || e.target.id === 'ov') { document.getElementById('ov').style.display = 'none'; selIdx = null; } }

async function toggleL() {
  if (selIdx === null) return;
  const p = PHONICS[selIdx];
  const k = itemKey(p);
  if (learned.has(k)) learned.delete(k); else learned.add(k);
  await saveLearned(learned);
  renderStats();
  renderGrid();
  const isL = learned.has(k);
  const btn = document.getElementById('btnL');
  btn.textContent = isL ? '✅ 已学会' : '⭐ 学会了';
  btn.className = 'btn-learn' + (isL ? ' done' : '');
}

function getEnVoice() {
  const voices = speechSynthesis.getVoices();
  let voice = voices.find(v => v.lang === 'en-US' && v.name.includes('Premium'));
  if (!voice) voice = voices.find(v => v.lang === 'en-US' && (v.name.includes('Samantha') || v.name.includes('Alex')));
  if (!voice) voice = voices.find(v => v.lang === 'en-US');
  if (!voice) voice = voices.find(v => v.lang && v.lang.startsWith('en'));
  return voice;
}

// 听这个音：根据 IPA 映射表播放字母/音素本身的发音（而非代表词）
function speakSound() {
  if (selIdx === null) return;
  const p = PHONICS[selIdx];
  if ('speechSynthesis' in window) {
    try {
      speechSynthesis.cancel();
      const sound = SOUND_MAP[p.ipa] || p.key;
      const u = new SpeechSynthesisUtterance(sound);
      u.lang = 'en-US';
      u.rate = 0.55;
      const v = getEnVoice();
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch (e) { console.log('Speech error:', e); }
  }
}

// 听发音：朗读代表词（真实单词，发音准确，帮助记住该字母/组合的音）
function speak() {
  if (selIdx === null) return;
  const p = PHONICS[selIdx];
  if ('speechSynthesis' in window) {
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(p.key);
      u.lang = 'en-US';
      u.rate = 0.75;
      const v = getEnVoice();
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch (e) { console.log('Speech error:', e); }
  }
}

function speakEx() {
  if (selIdx === null) return;
  const p = PHONICS[selIdx];
  if ('speechSynthesis' in window) {
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(p.example);
      u.lang = 'en-US';
      u.rate = 0.8;
      const v = getEnVoice();
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch (e) { console.log('Speech error:', e); }
  }
}

if ('speechSynthesis' in window) {
  const loadVoices = () => speechSynthesis.getVoices();
  loadVoices();
  if (speechSynthesis.onvoiceschanged === undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  setTimeout(loadVoices, 100);
}

initStorage();
</script>
