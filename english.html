<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词乐园 - 英文单词学习</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #8B5CF6;
  --color-primary-light: #F5F3FF;
  --color-primary-dark: #7C3AED;
  --color-success: #10B981;
  --color-success-light: #D1FAE5;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F3F4F6;
  --color-background-tertiary: #F9FAFB;
  --color-border-primary: #E5E7EB;
  --color-border-secondary: #D1D5DB;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, #F8FAFC 0%, #F5F3FF 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  justify-content: flex-start;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}

.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 8px 16px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  flex-shrink: 0;
  border: 2px solid transparent;
}

.nav-tab.chinese {
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  border-color: var(--color-border-secondary);
  box-shadow: var(--shadow-sm);
}

.nav-tab.chinese:hover {
  border-color: #6366F1;
  color: #6366F1;
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.nav-tab.english {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  box-shadow: var(--shadow-md);
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--color-text-primary);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-box {
  border: 1px solid var(--color-border-primary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  font-size: 14px;
  width: 180px;
  outline: none;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.search-box:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
  transform: translateY(-1px);
}

.search-box::placeholder {
  color: var(--color-text-tertiary);
}

.stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.spill {
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 6px 14px;
  font-size: 12px;
  color: var(--color-text-secondary);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border-primary);
}

.spill b {
  color: var(--color-primary);
  font-weight: 600;
}

.pgbar {
  flex: 1;
  min-width: 80px;
  height: 6px;
  background: var(--color-background-secondary);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.pgfill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), #A78BFA);
  border-radius: var(--radius-sm);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.cats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.cat {
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  padding: 6px 14px;
  border-radius: var(--radius-lg);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.cat:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.cat.on {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border-color: var(--color-primary);
  box-shadow: var(--shadow-md);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-primary);
  border-radius: var(--radius-xl);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  padding: 14px 12px 12px;
  box-shadow: var(--shadow-sm);
}

.card:hover {
  border-color: var(--color-primary);
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-xl);
}

.card.done {
  border-color: var(--color-success);
  background: linear-gradient(135deg, var(--color-success-light) 0%, #ECFDF5 100%);
}

.card.done:hover {
  border-color: var(--color-success);
  box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
}

.done-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
  color: #FFFFFF;
  border-radius: var(--radius-md);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
}

.card-emoji {
  font-size: 40px;
  text-align: center;
  margin-bottom: 6px;
  line-height: 1;
}

.card-word {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-text-primary);
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}

.card-phonetic {
  font-size: 12px;
  color: var(--color-text-tertiary);
  text-align: center;
  font-style: italic;
  margin-bottom: 8px;
}

.card-meaning {
  font-size: 11px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--color-border-secondary);
  width: 840px;
  max-width: 96vw;
  padding: 3.5rem 3.5rem 3rem;
  min-height: 650px;
  box-shadow: var(--shadow-xl);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.btn-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-md);
  color: var(--color-text-primary);
}

.btn-nav:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
  transform: translateY(-50%) scale(1.1);
}

.btn-nav-prev {
  left: -24px;
}

.btn-nav-next {
  right: -24px;
}

.modal-counter {
  text-align: center;
  font-size: 14px;
  color: var(--color-text-tertiary);
  margin-top: 16px;
}

.modal {
  position: relative;
}

.modal-cat {
  text-align: center;
  margin-bottom: 24px;
}

.modal-cat-badge {
  display: inline-block;
  background: var(--color-primary-light);
  color: var(--color-primary);
  border-radius: var(--radius-md);
  font-size: 24px;
  font-weight: 500;
  padding: 6px 24px;
}

.modal-emoji {
  font-size: 80px;
  text-align: center;
  margin-bottom: 12px;
  line-height: 1;
}

.modal-word {
  font-size: 80px;
  font-weight: 700;
  color: var(--color-text-primary);
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.modal-phonetic {
  text-align: center;
  font-size: 28px;
  color: var(--color-text-tertiary);
  font-style: italic;
  margin-bottom: 24px;
}

.modal-meaning {
  text-align: center;
  font-size: 32px;
  color: var(--color-text-secondary);
  margin-bottom: 24px;
}

.modal-example {
  background: var(--color-background-secondary);
  border-radius: var(--radius-md);
  padding: 24px 28px;
  margin-bottom: 36px;
}

.modal-example-en {
  font-size: 24px;
  color: var(--color-text-primary);
  text-align: center;
  margin-bottom: 12px;
  font-weight: 500;
}

.modal-example-zh {
  font-size: 18px;
  color: var(--color-text-secondary);
  text-align: center;
}

.modal-btns {
  display: flex;
  gap: 20px;
}

.btn-speak {
  flex: 0 0 auto;
  border: 2px solid #C4B5FD;
  color: var(--color-primary);
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 20px 28px;
  font-size: 32px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
}

.btn-speak:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-ex-speak {
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--radius-sm);
  background: var(--color-background-primary);
  color: var(--color-primary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-ex-speak:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
}

.ex-btns {
  display: flex;
  justify-content: center;
  margin: 8px 0;
}

.btn-learn {
  flex: 1;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-md);
  padding: 20px;
  font-size: 28px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.btn-learn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.btn-learn.done {
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
}

.btn-backtop {
  position: fixed;
  bottom: 20px;
  left: 12px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--color-primary);
  background: var(--color-background-primary);
  color: var(--color-primary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-md);
}

.btn-backtop:hover {
  background: var(--color-primary);
  color: #FFFFFF;
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.btn-close {
  flex: 0 0 auto;
  border: 2px solid var(--color-border-secondary);
  color: var(--color-text-secondary);
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 20px 28px;
  font-size: 28px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-close:hover {
  border-color: var(--color-text-tertiary);
  color: var(--color-text-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.empty {
  color: var(--color-text-tertiary);
  font-size: 15px;
  padding: 3rem 2rem;
  text-align: center;
  grid-column: 1/-1;
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px dashed var(--color-border-primary);
}

@media (max-width: 480px) {
  #app {
    padding: 1rem 0.75rem 2rem;
  }

  .nav-tabs {
    flex-wrap: nowrap;
    justify-content: flex-start;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 7px 14px;
    font-size: 13px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .header h1 {
    font-size: 18px;
  }

  .search-box {
    width: 100%;
  }

  .grid {
    grid-template-columns: repeat(1, 1fr);
    gap: 10px;
  }

  .card-word {
    font-size: 20px;
  }

  .modal {
    width: 100vw;
    max-width: 100vw;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
    padding: 1rem 0.75rem 1.5rem;
    min-height: unset;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .modal-word {
    font-size: 56px;
  }

  .modal-phonetic {
    font-size: 18px;
  }

  .modal-meaning {
    font-size: 22px;
  }

  .modal-example {
    font-size: 14px;
  }

  .modal-emoji {
    font-size: 48px;
  }

  .btn-nav {
    width: 40px;
    height: 40px;
    font-size: 24px;
  }

  .btn-nav-prev {
    left: 8px;
  }

  .btn-nav-next {
    right: 8px;
  }

  .modal-cat-badge {
    font-size: 18px;
    padding: 4px 16px;
  }

  .modal-btns {
    gap: 8px;
    margin-top: 16px;
  }

  .btn-speak, .btn-learn, .btn-close {
    padding: 10px 16px;
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div id="app">
  <div class="nav-tabs">
    <div class="nav-tab chinese" onclick="window.location.href='chinese.html'">📝 汉字学习</div>
    <div class="nav-tab english">🔤 单词学习</div>
    <div class="nav-tab chinese" onclick="window.location.href='pinyin.html'">🈶 拼音学习</div>
    <div class="nav-tab chinese" onclick="window.location.href='phonics.html'">🔠 自然拼读</div>
    <div class="nav-tab chinese" onclick="window.location.href='game.html'">🎮 趣味游戏</div>
    <div class="nav-tab chinese" onclick="window.location.href='math_addition.html'">➕ 加法思路</div>
    <div class="nav-tab chinese" onclick="window.location.href='math_subtraction.html'">➖ 减法思路</div>
    <div class="nav-tab chinese" onclick="window.location.href='math_vocab.html'">🔢 数字词汇</div>
  </div>
  <div class="header">
    <h1>📚 单词乐园</h1>
    <input class="search-box" id="sb" placeholder="🔍 搜索单词..." oninput="doFilter()">
    
  </div>
  <div class="stats" id="stats"></div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="ov" style="display:none" onclick="closeOv(event)">
  <div class="modal" id="modal">
    <button class="btn-nav btn-nav-prev" onclick="prevItem()">‹</button>
    <button class="btn-nav btn-nav-next" onclick="nextItem()">›</button>
    <div class="modal-cat" id="mCat"></div>
    <div class="modal-emoji" id="mEmoji"></div>
    <div class="modal-word" id="mWord"></div>
    <div class="modal-phonetic" id="mPhonetic"></div>
    <div class="modal-meaning" id="mMean"></div>
    <div class="modal-example">
      <div class="modal-example-en" id="mExEn"></div>
      <div class="ex-btns"><button class="btn-ex-speak" onclick="speakEx()">🔊</button></div>
      <div class="modal-example-zh" id="mExZh"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-speak" onclick="speak()">🔊 单词</button>
      <button class="btn-learn" id="btnL" onclick="toggleL()">⭐ 学会了</button>
      <button class="btn-close" onclick="closeOv()">关闭</button>
    </div>
    <div class="modal-counter" id="mCounter"></div>
  </div>
</div>

<script>
const ENGLISH_WORDS = [
  { word: 'apple', phonetic: '/ˈæpl/', meaning: '苹果', exampleEn: 'I eat an apple every day.', exampleZh: '我每天吃一个苹果。', category: '水果' },
  { word: 'banana', phonetic: '/bəˈnænə/', meaning: '香蕉', exampleEn: 'Bananas are yellow.', exampleZh: '香蕉是黄色的。', category: '水果' },
  { word: 'orange', phonetic: '/ˈɔːrɪndʒ/', meaning: '橙子', exampleEn: 'Oranges are sweet and sour.', exampleZh: '橙子又甜又酸。', category: '水果' },
  { word: 'grape', phonetic: '/ɡreɪp/', meaning: '葡萄', exampleEn: 'Grapes grow in clusters.', exampleZh: '葡萄成串生长。', category: '水果' },
  { word: 'pear', phonetic: '/per/', meaning: '梨', exampleEn: 'This pear is very juicy.', exampleZh: '这个梨汁很多。', category: '水果' },
  { word: 'peach', phonetic: '/piːtʃ/', meaning: '桃子', exampleEn: 'Peaches are soft and sweet.', exampleZh: '桃子又软又甜。', category: '水果' },
  { word: 'watermelon', phonetic: '/ˈwɔːtərmelən/', meaning: '西瓜', exampleEn: 'Watermelon is refreshing in summer.', exampleZh: '西瓜在夏天很清凉。', category: '水果' },
  { word: 'strawberry', phonetic: '/ˈstrɔːberi/', meaning: '草莓', exampleEn: 'Strawberries are red and sweet.', exampleZh: '草莓又红又甜。', category: '水果' },
  { word: 'cat', phonetic: '/kæt/', meaning: '猫', exampleEn: 'The cat is sleeping.', exampleZh: '猫正在睡觉。', category: '动物' },
  { word: 'dog', phonetic: '/dɔːɡ/', meaning: '狗', exampleEn: 'Dogs are man\'s best friends.', exampleZh: '狗是人类最好的朋友。', category: '动物' },
  { word: 'bird', phonetic: '/bɜːrd/', meaning: '鸟', exampleEn: 'Birds can fly.', exampleZh: '鸟会飞。', category: '动物' },
  { word: 'fish', phonetic: '/fɪʃ/', meaning: '鱼', exampleEn: 'Fish swim in the water.', exampleZh: '鱼在水里游。', category: '动物' },
  { word: 'horse', phonetic: '/hɔːrs/', meaning: '马', exampleEn: 'Horses run very fast.', exampleZh: '马跑得很快。', category: '动物' },
  { word: 'cow', phonetic: '/kaʊ/', meaning: '牛', exampleEn: 'Cows give us milk.', exampleZh: '牛给我们牛奶。', category: '动物' },
  { word: 'rabbit', phonetic: '/ˈræbɪt/', meaning: '兔子', exampleEn: 'Rabbits have long ears.', exampleZh: '兔子有长长的耳朵。', category: '动物' },
  { word: 'panda', phonetic: '/ˈpændə/', meaning: '熊猫', exampleEn: 'Pandas love bamboo.', exampleZh: '熊猫喜欢吃竹子。', category: '动物' },
  { word: 'tiger', phonetic: '/ˈtaɪɡər/', meaning: '老虎', exampleEn: 'Tigers are very strong.', exampleZh: '老虎很强壮。', category: '动物' },
  { word: 'lion', phonetic: '/ˈlaɪən/', meaning: '狮子', exampleEn: 'Lions are the king of animals.', exampleZh: '狮子是百兽之王。', category: '动物' },

const CATS = ['全部', ...new Set(ENGLISH_WORDS.map(w => w.category))];

let curCat = '全部', learned = new Set(), selIdx = null, sq = '';

const DB_NAME = 'EnglishWordDB';
const DB_VERSION = 1;
const STORE_NAME = 'learnedWords';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
  });
}

async function loadLearned() {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get('learned');
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        const data = request.result;
        if (data && data.words) {
          resolve(new Set(data.words));
        } else {
          const localStorageData = localStorage.getItem('ewl1');
          if (localStorageData) {
            const lsSet = new Set(JSON.parse(localStorageData));
            saveLearned(lsSet);
            resolve(lsSet);
          } else {
            resolve(new Set());
          }
        }
      };
    });
  } catch (e) {
    const localStorageData = localStorage.getItem('ewl1');
    return localStorageData ? new Set(JSON.parse(localStorageData)) : new Set();
  }
}

async function saveLearned(wordsSet) {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put({ words: [...wordsSet] }, 'learned');
    transaction.oncomplete = () => {
      localStorage.setItem('ewl1', JSON.stringify([...wordsSet]));
    };
    transaction.onerror = () => {
      localStorage.setItem('ewl1', JSON.stringify([...wordsSet]));
    };
  } catch (e) {
    localStorage.setItem('ewl1', JSON.stringify([...wordsSet]));
  }
}

async function initStorage() {
  learned = await loadLearned();
  renderStats();
  renderCats();
  renderGrid();
}

function renderStats() {
  const list = getList();
  const tot = list.length;
  const done = list.filter(w => learned.has(w.word)).length;
  const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="spill">已学 <b>${done}</b> 词</div>
    <div class="spill">共 <b>${tot}</b> 词</div>
    <div class="spill">完成 <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function getCatCount(cat) {
  return ENGLISH_WORDS.filter(w => {
    const co = cat === '全部' || w.category === cat;
    const qo = !sq || w.word.toLowerCase().includes(sq.toLowerCase()) || w.meaning.includes(sq);
    return co && qo;
  }).length;
}

function renderCats() {
  document.getElementById('cats').innerHTML = CATS.map(c =>
    `<button class="cat${c === curCat ? ' on' : ''}" onclick="setCat('${c}')">${c} <span style="font-size:11px;opacity:0.7">[${getCatCount(c)}]</span></button>`
  ).join('');
}

function setCat(c) { curCat = c; renderCats(); renderGrid(); }
function doFilter() { sq = document.getElementById('sb').value.trim(); renderCats(); renderGrid(); }

function getList() {
  return ENGLISH_WORDS.filter(w => {
    const co = curCat === '全部' || w.category === curCat;
    const qo = !sq || w.word.toLowerCase().includes(sq.toLowerCase()) || w.meaning.includes(sq);
    return co && qo;
  });
}

function renderGrid() {
  const list = getList();
  if (!list.length) { document.getElementById('grid').innerHTML = `<div class="empty">没有找到「${sq}」相关单词</div>`; return; }
  document.getElementById('grid').innerHTML = list.map(w => {
    const isL = learned.has(w.word);
    const emoji = getEmoji(w.meaning, w.category);
    return `<div class="card${isL ? ' done' : ''}" onclick="openModal(${ENGLISH_WORDS.indexOf(w)})">
      ${isL ? '<span class="done-badge">✓ 学会</span>' : ''}
      <div class="card-emoji">${emoji}</div>
      <div class="card-word">${w.word}</div>
      <div class="card-phonetic">${w.phonetic}</div>
      <div class="card-meaning">${w.meaning}</div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  selIdx = idx;
  const w = ENGLISH_WORDS[idx];
  document.getElementById('mCat').innerHTML = `<span class="modal-cat-badge">${w.category}</span>`;
  document.getElementById('mEmoji').textContent = getEmoji(w.meaning, w.category);
  document.getElementById('mWord').textContent = w.word;
  document.getElementById('mPhonetic').textContent = w.phonetic;
  document.getElementById('mMean').textContent = w.meaning;
  document.getElementById('mExEn').textContent = w.exampleEn || '';
  document.getElementById('mExZh').textContent = w.exampleZh || '';
  const isL = learned.has(w.word);
  const btn = document.getElementById('btnL');
  btn.textContent = isL ? '✅ 已学会' : '⭐ 学会了';
  btn.className = 'btn-learn' + (isL ? ' done' : '');
  document.getElementById('mCounter').textContent = `${idx+1} / ${ENGLISH_WORDS.length}`;
  document.querySelector('.btn-nav-prev').style.opacity = idx === 0 ? '0.3' : '1';
  document.querySelector('.btn-nav-next').style.opacity = idx === ENGLISH_WORDS.length - 1 ? '0.3' : '1';
  document.getElementById('ov').style.display = 'flex';
}

function prevItem() {
  if (selIdx > 0) openModal(selIdx - 1);
}

function nextItem() {
  if (selIdx < ENGLISH_WORDS.length - 1) openModal(selIdx + 1);
}

document.addEventListener('keydown', function(e) {
  if (document.getElementById('ov').style.display !== 'none') {
    if (e.key === 'ArrowLeft') prevItem();
    if (e.key === 'ArrowRight') nextItem();
    if (e.key === 'Escape') closeOv();
  }
});

function closeOv(e) { if (!e || e.target.id === 'ov') { document.getElementById('ov').style.display = 'none'; selIdx = null; } }

async function toggleL() {
  if (selIdx === null) return;
  const w = ENGLISH_WORDS[selIdx];
  if (learned.has(w.word)) learned.delete(w.word); else learned.add(w.word);
  await saveLearned(learned);
  renderStats();
  renderGrid();
  const isL = learned.has(w.word);
  const btn = document.getElementById('btnL');
  btn.textContent = isL ? '✅ 已学会' : '⭐ 学会了';
  btn.className = 'btn-learn' + (isL ? ' done' : '');
}

function getEnVoice() {
  const voices = speechSynthesis.getVoices();
  // Prefer premium US English voice for natural accent
  let voice = voices.find(v => v.lang === 'en-US' && v.name.includes('Premium'));
  if (!voice) voice = voices.find(v => v.lang === 'en-US');
  if (!voice) voice = voices.find(v => v.lang.startsWith('en-US'));
  if (!voice) voice = voices.find(v => v.lang.startsWith('en-GB'));
  if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
  if (!voice && voices.length > 0) voice = voices[0];
  return voice;
}

function speak() {
  if (selIdx === null) return;
  const w = ENGLISH_WORDS[selIdx];
  if ('speechSynthesis' in window) {
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(w.word);
      u.lang = 'en-US';
      u.rate = 0.9;
      u.pitch = 1.0;
      u.volume = 1.0;
      const voice = getEnVoice();
      if (voice) {
        u.voice = voice;
        u.voiceURI = voice.voiceURI;
      }
      speechSynthesis.speak(u);
    } catch (e) { console.log('Speech error:', e); }
  }
}

function speakEx() {
  if (selIdx === null) return;
  const w = ENGLISH_WORDS[selIdx];
  if ('speechSynthesis' in window) {
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(w.exampleEn);
      u.lang = 'en-US';
      u.rate = 0.85;
      u.pitch = 1.0;
      u.volume = 1.0;
      const voice = getEnVoice();
      if (voice) {
        u.voice = voice;
        u.voiceURI = voice.voiceURI;
      }
      speechSynthesis.speak(u);
    } catch (e) { console.log('Speech error:', e); }
  }
}

// Preload voices
if ('speechSynthesis' in window) {
  const loadVoices = () => speechSynthesis.getVoices();
  loadVoices();
  if (speechSynthesis.onvoiceschanged === undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  setTimeout(loadVoices, 100);
}

window.addEventListener('scroll', function() {
  const btn = document.getElementById('btnBackTop');
  if (btn) {
    btn.style.display = window.scrollY > 300 ? 'block' : 'none';
  }
});

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
