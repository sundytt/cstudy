<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼音乐园 - 汉语拼音学习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #EC4899;
  --color-primary-light: #FCE7F3;
  --color-primary-dark: #DB2777;
  --color-success: #10B981;
  --color-success-light: #D1FAE5;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F3F4F6;
  --color-background-tertiary: #F9FAFB;
  --color-border-primary: #E5E7EB;
  --color-border-secondary: #D1D5DB;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, #F8FAFC 0%, #FDF2F8 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  justify-content: flex-start;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}

.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 8px 16px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  flex-shrink: 0;
  border: 2px solid transparent;
}

.nav-tab.other {
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  border-color: var(--color-border-secondary);
  box-shadow: var(--shadow-sm);
}

.nav-tab.other:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.nav-tab.active {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  box-shadow: var(--shadow-md);
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--color-text-primary);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-box {
  border: 1px solid var(--color-border-primary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  font-size: 14px;
  width: 180px;
  outline: none;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.search-box:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
  transform: translateY(-1px);
}

.search-box::placeholder {
  color: var(--color-text-tertiary);
}

.stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.spill {
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 6px 14px;
  font-size: 12px;
  color: var(--color-text-secondary);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border-primary);
}

.spill b {
  color: var(--color-primary);
  font-weight: 600;
}

.pgbar {
  flex: 1;
  min-width: 80px;
  height: 6px;
  background: var(--color-background-secondary);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.pgfill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), #F9A8D4);
  border-radius: var(--radius-sm);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.cats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.cat {
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  padding: 6px 14px;
  border-radius: var(--radius-lg);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.cat:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.cat.on {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border-color: var(--color-primary);
  box-shadow: var(--shadow-md);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-primary);
  border-radius: var(--radius-xl);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  padding: 14px 12px 12px;
  box-shadow: var(--shadow-sm);
  text-align: center;
}

.card:hover {
  border-color: var(--color-primary);
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-xl);
}

.card.done {
  border-color: var(--color-success);
  background: linear-gradient(135deg, var(--color-success-light) 0%, #ECFDF5 100%);
}

.card.done:hover {
  border-color: var(--color-success);
  box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
}

.done-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
  color: #FFFFFF;
  border-radius: var(--radius-md);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
}

.card-emoji {
  font-size: 32px;
  margin-bottom: 4px;
  line-height: 1;
}

.card-unit {
  font-size: 26px;
  font-weight: 700;
  color: var(--color-primary-dark);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.btn-speak-sm {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border: none;
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.btn-speak-sm:hover {
  background: var(--color-primary);
  color: #FFFFFF;
  transform: scale(1.2);
}

.card-example {
  font-size: 22px;
  color: var(--color-text-primary);
  margin-bottom: 4px;
  font-family: 'Noto Sans SC', sans-serif;
}

.card-meaning {
  font-size: 11px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--color-border-secondary);
  width: 840px;
  max-width: 96vw;
  padding: 3rem 3.5rem 2.5rem;
  min-height: 640px;
  box-shadow: var(--shadow-xl);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  max-height: 92vh;
  overflow-y: auto;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.btn-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-md);
  color: var(--color-text-primary);
}

.btn-nav:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
  transform: translateY(-50%) scale(1.1);
}

.btn-nav-prev { left: -24px; }
.btn-nav-next { right: -24px; }

.modal-counter {
  text-align: center;
  font-size: 14px;
  color: var(--color-text-tertiary);
  margin-top: 16px;
}

.modal-cat {
  text-align: center;
  margin-bottom: 20px;
}

.modal-cat-badge {
  display: inline-block;
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
  border-radius: var(--radius-md);
  font-size: 22px;
  font-weight: 500;
  padding: 6px 24px;
}

.modal-emoji {
  font-size: 64px;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1;
}

.modal-unit {
  font-size: 72px;
  font-weight: 700;
  color: var(--color-primary-dark);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.btn-speak-lg {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border: 2px solid var(--color-primary);
  background: var(--color-background-primary);
  color: var(--color-primary);
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.btn-speak-lg:hover {
  background: var(--color-primary);
  color: #FFFFFF;
  transform: scale(1.1);
}

.modal-desc {
  text-align: center;
  font-size: 18px;
  color: var(--color-text-secondary);
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-key {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--color-primary-light);
  border-radius: var(--radius-md);
  padding: 16px 24px;
  margin-bottom: 18px;
}

.modal-key-example {
  font-size: 48px;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--color-primary-dark);
}

.modal-key-pinyin {
  font-size: 26px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.modal-words {
  text-align: center;
  font-size: 17px;
  color: var(--color-text-secondary);
  margin-bottom: 16px;
  line-height: 2;
}
.modal-words span { color: var(--color-text-primary); font-weight: 500; margin: 0 6px; cursor: pointer; }
.modal-words span:hover { color: var(--color-primary); text-decoration: underline; }

.modal-example {
  background: var(--color-background-secondary);
  border-radius: var(--radius-md);
  padding: 18px 24px;
  margin-bottom: 24px;
}

.modal-example-py {
  font-size: 20px;
  color: var(--color-primary-dark);
  text-align: center;
  margin-bottom: 4px;
  font-weight: 600;
}

.modal-example-zh {
  font-size: 24px;
  color: var(--color-text-primary);
  text-align: center;
  margin-bottom: 8px;
  font-family: 'Noto Sans SC', sans-serif;
}

.tone-table {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.tone-cell {
  border: 1px solid var(--color-border-primary);
  border-radius: var(--radius-md);
  padding: 14px 8px;
  text-align: center;
  background: var(--color-background-tertiary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.tone-cell:hover {
  border-color: var(--color-primary);
  background: var(--color-primary-light);
  transform: translateY(-2px);
}

.tone-mark {
  display: inline-block;
  font-size: 11px;
  color: #fff;
  border-radius: 6px;
  padding: 1px 6px;
  margin-bottom: 6px;
  font-weight: 600;
}
.tone-mark.t1 { background: #EF4444; }
.tone-mark.t2 { background: #10B981; }
.tone-mark.t3 { background: #F59E0B; }
.tone-mark.t4 { background: #3B82F6; }

.tone-char {
  font-size: 36px;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--color-text-primary);
  line-height: 1.2;
}

.tone-py {
  font-size: 18px;
  font-weight: 600;
  color: var(--color-primary-dark);
  margin: 2px 0;
}

.tone-mean {
  font-size: 11px;
  color: var(--color-text-tertiary);
}

.modal-btns {
  display: flex;
  gap: 16px;
}

.btn-learn {
  flex: 1;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-md);
  padding: 18px;
  font-size: 24px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.btn-learn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.btn-learn.done {
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
}

.btn-close {
  flex: 0 0 auto;
  border: 2px solid var(--color-border-secondary);
  color: var(--color-text-secondary);
  background: var(--color-background-primary);
  border-radius: var(--radius-md);
  padding: 18px 24px;
  font-size: 22px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-close:hover {
  border-color: var(--color-text-tertiary);
  color: var(--color-text-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.empty {
  color: var(--color-text-tertiary);
  font-size: 15px;
  padding: 3rem 2rem;
  text-align: center;
  grid-column: 1/-1;
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  border: 1px dashed var(--color-border-primary);
}

.btn-backtop {
  position: fixed;
  bottom: 20px;
  left: 12px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--color-primary);
  background: var(--color-background-primary);
  color: var(--color-primary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-md);
}

.btn-backtop:hover {
  background: var(--color-primary);
  color: #FFFFFF;
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

@media (max-width: 480px) {
  #app { padding: 1rem 0.75rem 2rem; }
  .nav-tabs {
    flex-wrap: nowrap;
    justify-content: flex-start;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 7px 14px;
    font-size: 13px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .header h1 { font-size: 18px; }
  .search-box { width: 100%; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .card { padding: 10px 6px 8px; }
  .card-example { font-size: 18px; }
  .modal {
    width: 100vw;
    max-width: 100vw;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
    padding: 1rem 0.75rem 1.5rem;
    min-height: unset;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
  }
  .modal-emoji { font-size: 44px; }
  .modal-unit { font-size: 42px; gap: 8px; }
  .btn-speak-lg { width: 32px; height: 32px; font-size: 16px; }
  .btn-speak-sm { width: 18px; height: 18px; font-size: 10px; }
  .card-unit { font-size: 20px; gap: 2px; }
  .modal-desc { font-size: 15px; }
  .modal-key { padding: 10px 14px; gap: 10px; }
  .modal-key-example { font-size: 34px; }
  .modal-key-pinyin { font-size: 20px; }
  .modal-words { font-size: 14px; }
  .modal-example-zh { font-size: 18px; }
  .modal-example-py { font-size: 16px; }
  .tone-table { gap: 6px; }
  .tone-cell { padding: 8px 4px; }
  .tone-char { font-size: 26px; }
  .tone-py { font-size: 14px; }
  .btn-nav { width: 40px; height: 40px; font-size: 24px; }
  .btn-nav-prev { left: 8px; }
  .btn-nav-next { right: 8px; }
  .modal-cat-badge { font-size: 16px; padding: 4px 16px; }
  .modal-btns { gap: 8px; margin-top: 16px; }
  .btn-learn, .btn-close { padding: 12px 16px; font-size: 15px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="nav-tabs">
    <div class="nav-tab other" onclick="window.location.href='chinese.html'">📝 汉字学习</div>
    <div class="nav-tab other" onclick="window.location.href='english.html'">🔤 单词学习</div>
    <div class="nav-tab active">🈶 拼音学习</div>
    <div class="nav-tab other" onclick="window.location.href='phonics.html'">🔠 自然拼读</div>
    <div class="nav-tab other" onclick="window.location.href='game.html'">🎮 趣味游戏</div>
    <div class="nav-tab other" onclick="window.location.href='math_addition.html'">➕ 加法思路</div>
    <div class="nav-tab other" onclick="window.location.href='math_subtraction.html'">➖ 减法思路</div>
    <div class="nav-tab other" onclick="window.location.href='math_vocab.html'">🔢 数字词汇</div>
  </div>
  <div class="header">
    <h1>🈶 拼音乐园</h1>
    <input class="search-box" id="sb" placeholder="🔍 搜索拼音 / 汉字..." oninput="doFilter()">
  </div>
  <div class="stats" id="stats"></div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="ov" style="display:none" onclick="closeOv(event)">
  <div class="modal" id="modal">
    <button class="btn-nav btn-nav-prev" onclick="prevItem()">‹</button>
    <button class="btn-nav btn-nav-next" onclick="nextItem()">›</button>
    <div class="modal-cat" id="mCat"></div>
    <div id="mBody"></div>
    <div class="modal-btns">
      <button class="btn-learn" id="btnL" onclick="toggleL()">⭐ 学会了</button>
      <button class="btn-close" onclick="closeOv()">关闭</button>
    </div>
    <div class="modal-counter" id="mCounter"></div>
  </div>
</div>

<script>
// 汉语拼音学习数据
// 学习路径：单韵母 → 声母 → 复韵母/鼻韵母 → 整体认读音节 → 声调拼读练习 → 词语应用
// unit: 拼音符号  type: 分类  desc: 发音要领  emoji: 图标
// example/examplePy: 代表汉字及拼音  words: 常用词语（汉字+拼音）  sentence/sentencePy: 例句
const PINYIN = [
  // ===== 1. 单韵母（6个）=====

const CATS = ['全部', '单韵母', '声母', '复韵母', '鼻韵母', '整体认读音节', '声调拼读', '词语应用'];

let curCat = '全部', learned = new Set(), selIdx = null, sq = '';

const DB_NAME = 'PinyinDB';
const DB_VERSION = 1;
const STORE_NAME = 'learnedPinyin';

function itemKey(p) { return p.type + '|' + p.unit; }

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
  });
}

async function loadLearned() {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get('learned');
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        const data = request.result;
        if (data && data.items) {
          resolve(new Set(data.items));
        } else {
          const ls = localStorage.getItem('pyl1');
          if (ls) {
            const lsSet = new Set(JSON.parse(ls));
            saveLearned(lsSet);
            resolve(lsSet);
          } else {
            resolve(new Set());
          }
        }
      };
    });
  } catch (e) {
    const ls = localStorage.getItem('pyl1');
    return ls ? new Set(JSON.parse(ls)) : new Set();
  }
}

async function saveLearned(itemsSet) {
  try {
    const db = await openDB();
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put({ items: [...itemsSet] }, 'learned');
    transaction.oncomplete = () => { localStorage.setItem('pyl1', JSON.stringify([...itemsSet])); };
    transaction.onerror = () => { localStorage.setItem('pyl1', JSON.stringify([...itemsSet])); };
  } catch (e) {
    localStorage.setItem('pyl1', JSON.stringify([...itemsSet]));
  }
}

async function initStorage() {
  learned = await loadLearned();
  renderStats();
  renderCats();
  renderGrid();
}

function renderStats() {
  const list = getList();
  const tot = list.length;
  const done = list.filter(p => learned.has(itemKey(p))).length;
  const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="spill">已学 <b>${done}</b> 个</div>
    <div class="spill">共 <b>${tot}</b> 个</div>
    <div class="spill">完成 <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function matchQuery(p) {
  if (!sq) return true;
  const s = sq.toLowerCase();
  if (p.unit.toLowerCase().includes(s)) return true;
  if (p.example && p.example.includes(sq)) return true;
  if (p.desc && p.desc.includes(sq)) return true;
  if (p.tones && p.tones.some(t => t.char.includes(sq) || t.py.toLowerCase().includes(s))) return true;
  return false;
}

function getCatCount(cat) {
  return PINYIN.filter(p => (cat === '全部' || p.type === cat) && matchQuery(p)).length;
}

function renderCats() {
  document.getElementById('cats').innerHTML = CATS.map(c =>
    `<button class="cat${c === curCat ? ' on' : ''}" onclick="setCat('${c}')">${c} <span style="font-size:11px;opacity:0.7">[${getCatCount(c)}]</span></button>`
  ).join('');
}

function setCat(c) { curCat = c; renderCats(); renderGrid(); }
function doFilter() { sq = document.getElementById('sb').value.trim(); renderCats(); renderGrid(); }

function getList() {
  return PINYIN.filter(p => (curCat === '全部' || p.type === curCat) && matchQuery(p));
}

function renderGrid() {
  const list = getList();
  if (!list.length) { document.getElementById('grid').innerHTML = `<div class="empty">没有找到「${sq}」相关内容</div>`; return; }
  document.getElementById('grid').innerHTML = list.map(p => {
    const isL = learned.has(itemKey(p));
    if (p.tones) {
      return `<div class="card${isL ? ' done' : ''}" onclick="openModal(${PINYIN.indexOf(p)})">
        ${isL ? '<span class="done-badge">✓ 学会</span>' : ''}
        <div class="card-emoji">🎵</div>
        <div class="card-unit">${p.unit}</div>
        <div class="card-example">${p.tones.map(t => t.char).join('')}</div>
        <div class="card-meaning">四声练习</div>
      </div>`;
    }
    return `<div class="card${isL ? ' done' : ''}" onclick="openModal(${PINYIN.indexOf(p)})">
      ${isL ? '<span class="done-badge">✓ 学会</span>' : ''}
      <div class="card-emoji">${p.emoji}</div>
      <div class="card-unit">${p.unit}<button class="btn-speak-sm" onclick="event.stopPropagation();speakPinyin('${p.unit}')" title="听发音">🔊</button></div>
      <div class="card-example">${p.example}</div>
      <div class="card-meaning">${p.type}</div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  selIdx = idx;
  const p = PINYIN[idx];
  document.getElementById('mCat').innerHTML = `<span class="modal-cat-badge">${p.type}</span>`;

  if (p.tones) {
    document.getElementById('mBody').innerHTML = `
      <div class="modal-unit">${p.unit} <button class="btn-speak-lg" onclick="speakPinyin('${p.unit}')" title="听发音">🔊</button></div>
      <div class="modal-desc">跟着声调符号，读出四个声调的不同</div>
      <div class="tone-table">
        ${p.tones.map((t, i) => `
          <div class="tone-cell" onclick="speakTone(${i})">
            <span class="tone-mark t${t.tone}">${'一二三四'[t.tone - 1]}声</span>
            <div class="tone-char">${t.char}</div>
            <div class="tone-py">${t.py}</div>
            <div class="tone-mean">${t.mean}</div>
          </div>`).join('')}
      </div>`;
  } else {
    document.getElementById('mBody').innerHTML = `
      <div class="modal-unit">${p.unit} <button class="btn-speak-lg" onclick="speakPinyin('${p.unit}')" title="听发音">🔊</button></div>
      <div class="modal-desc">${p.desc}</div>
      <div class="modal-key">
        <div class="modal-key-example">${p.example}</div>
        <div class="modal-key-pinyin">${p.examplePy}</div>
      </div>
      <div class="modal-words">常用词：${p.words.split(' ').map(w => `<span onclick="speakText('${w.replace(/\(.*\)/, '')}')">${w}</span>`).join(' ')}</div>
      <div class="modal-example">
        <div class="modal-example-zh">${p.sentence}</div>
        <div class="modal-example-py">${p.sentencePy}</div>
      </div>`;
  }

  const isL = learned.has(itemKey(p));
  const btn = document.getElementById('btnL');
  btn.textContent = isL ? '✅ 已学会' : '⭐ 学会了';
  btn.className = 'btn-learn' + (isL ? ' done' : '');
  document.getElementById('mCounter').textContent = `${idx + 1} / ${PINYIN.length}`;
  document.querySelector('.btn-nav-prev').style.opacity = idx === 0 ? '0.3' : '1';
  document.querySelector('.btn-nav-next').style.opacity = idx === PINYIN.length - 1 ? '0.3' : '1';
  document.getElementById('ov').style.display = 'flex';
  document.getElementById('modal').scrollTop = 0;
}

function prevItem() { if (selIdx > 0) openModal(selIdx - 1); }
function nextItem() { if (selIdx < PINYIN.length - 1) openModal(selIdx + 1); }

document.addEventListener('keydown', function (e) {
  if (document.getElementById('ov').style.display !== 'none') {
    if (e.key === 'ArrowLeft') prevItem();
    if (e.key === 'ArrowRight') nextItem();
    if (e.key === 'Escape') closeOv();
  }
});

function closeOv(e) { if (!e || e.target.id === 'ov') { document.getElementById('ov').style.display = 'none'; selIdx = null; } }

async function toggleL() {
  if (selIdx === null) return;
  const p = PINYIN[selIdx];
  const k = itemKey(p);
  if (learned.has(k)) learned.delete(k); else learned.add(k);
  await saveLearned(learned);
  renderStats();
  renderGrid();
  const isL = learned.has(k);
  const btn = document.getElementById('btnL');
  btn.textContent = isL ? '✅ 已学会' : '⭐ 学会了';
  btn.className = 'btn-learn' + (isL ? ' done' : '');
}

function getZhVoice() {
  const voices = speechSynthesis.getVoices();
  const priorityPatterns = [/Microsoft Yaoyao/, /Google 普通话/, /Google Chinese/, /Microsoft Xiaoxiao/, /Microsoft Huihui/, /Tingting/];
  let voice = voices.find(v => v.lang === 'zh-CN');
  if (!voice) {
    for (const pattern of priorityPatterns) {
      voice = voices.find(v => v.name.match(pattern));
      if (voice) break;
    }
  }
  if (!voice) voice = voices.find(v => v.lang && v.lang.includes('zh'));
  if (!voice && voices.length > 0) voice = voices[0];
  return voice;
}

function speakZh(text, rate) {
  if (!text || !('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN';
      u.rate = rate || 0.8;
      u.pitch = 1.0;
      u.volume = 1.0;
      const v = getZhVoice();
      if (v) { u.voice = v; u.voiceURI = v.voiceURI; }
      speechSynthesis.speak(u);
    }, 50);
  } catch (e) { console.log('Speech error:', e); }
}

function speakText(text) {
  speakZh(text, 0.8);
}

  'a':'啊啊','o':'奥奥','e':'鹅鹅','i':'衣衣','u':'乌乌','ü':'鱼鱼',

  'j':'鸡','q':'七','x':'西',
  'zh':'知','ch':'吃','sh':'诗','r':'日',
  'z':'资','c':'词','s':'丝',
  'y':'衣','w':'屋',
  // 复韵母
  'ai':'哀哀','ei':'诶诶','ui':'威威','ao':'凹凹','ou':'欧欧','iu':'优优',
  'ie':'耶耶','üe':'约约','er':'儿儿',
  // 鼻韵母
  'an':'安安','en':'恩恩','in':'因因','un':'温温','ün':'晕晕',
  'ang':'昂昂','eng':'鞥鞥','ing':'英英','ong':'翁翁',
  // 整体认读音节
  'zhi':'知','chi':'吃','shi':'诗','ri':'日',
  'zi':'子','ci':'词','si':'四',
  'yi':'一','wu':'五','yu':'鱼',
  'ye':'叶','yue':'月','yuan':'圆',
  'yin':'音','yun':'云','ying':'英',
  // 声调拼读（一声对应字）
  'ma':'妈','ba':'八','tang':'汤','qi':'七','shu':'书','xi':'西',
};

function speakPinyin(unit) {
  const text = SPEAK_MAP[unit] || unit;
  if (!text || !('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN';
      u.rate = 0.6;
      u.pitch = 1.0;
      u.volume = 1.0;
      const v = getZhVoice();
      if (v) { u.voice = v; u.voiceURI = v.voiceURI; }
      speechSynthesis.speak(u);
    }, 50);
  } catch(e) { console.log('Speech error:', e); }
}

function speakTone(i) {
  if (selIdx === null) return;
  const p = PINYIN[selIdx];
  if (!p.tones) return;
  speakZh(p.tones[i].char, 0.7);
}

  const loadVoices = () => speechSynthesis.getVoices();
  loadVoices();
  if (speechSynthesis.onvoiceschanged === undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  setTimeout(loadVoices, 100);
}

    btn.style.display = window.scrollY > 300 ? 'block' : 'none';

function scrollToTop() {
