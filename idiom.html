<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成语乐园 - 成语学习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #F59E0B;
  --color-primary-light: #FEF3C7;
  --color-primary-dark: #D97706;
  --color-success: #10B981;
  --color-success-light: #D1FAE5;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F3F4F6;
  --color-background-tertiary: #F9FAFB;
  --color-border-primary: #E5E7EB;
  --color-border-secondary: #D1D5DB;
  --color-border-tertiary: #E5E7EB;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-serif: 'Noto Serif TC', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, #FFF7ED 0%, #FFFBEB 50%, #FEF3C7 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
#app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

.nav-tabs {
  display: flex; gap: 8px; margin-bottom: 1rem; justify-content: flex-start;
  flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 4px;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 8px 16px; border-radius: var(--radius-lg); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.2s ease;
  white-space: nowrap; flex-shrink: 0; border: 2px solid transparent;
}
.nav-tab.idiom {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF; box-shadow: var(--shadow-md);
}
.nav-tab.other {
  background: var(--color-background-primary); color: var(--color-text-secondary);
  border-color: var(--color-border-secondary); box-shadow: var(--shadow-sm);
}
.nav-tab.other:hover { border-color: #F59E0B; color: #F59E0B; transform: translateY(-1px); }

.header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.header h1 { font-size: 22px; font-weight: 600; color: var(--color-text-primary); flex: 1; }

.search-box {
  border: 1px solid var(--color-border-primary); background: var(--color-background-primary);
  color: var(--color-text-primary); border-radius: var(--radius-lg); padding: 10px 16px;
  font-size: 14px; width: 200px; outline: none; transition: all 0.2s ease; box-shadow: var(--shadow-sm);
}
.search-box:focus {
  border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light);
  transform: translateY(-1px);
}
.search-box::placeholder { color: var(--color-text-tertiary); }

.stats {
  display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.spill {
  background: var(--color-background-primary); border-radius: var(--radius-md);
  padding: 6px 14px; font-size: 12px; color: var(--color-text-secondary);
  box-shadow: var(--shadow-sm); border: 1px solid var(--color-border-tertiary);
}
.spill b { color: var(--color-primary-dark); font-weight: 600; }
.pgbar {
  flex: 1; min-width: 80px; height: 6px; background: var(--color-background-secondary);
  border-radius: var(--radius-sm); overflow: hidden;
}
.pgfill {
  height: 100%; background: linear-gradient(90deg, var(--color-success), #34D399);
  border-radius: var(--radius-sm); transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.cat {
  border: 1px solid var(--color-border-secondary); background: var(--color-background-primary);
  color: var(--color-text-secondary); padding: 6px 14px; border-radius: var(--radius-lg);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; box-shadow: var(--shadow-sm);
}
.cat:hover { border-color: var(--color-primary); color: var(--color-primary); transform: translateY(-1px); }
.cat.on {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF; border-color: var(--color-primary); box-shadow: var(--shadow-md);
}

.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

.card {
  background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary);
  border-radius: var(--radius-xl); overflow: hidden; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1); position: relative;
  padding: 14px 16px 12px; box-shadow: var(--shadow-sm);
}
.card:hover {
  border-color: var(--color-primary); transform: translateY(-4px) scale(1.02); box-shadow: var(--shadow-xl);
}
.card.done {
  border-color: var(--color-success);
  background: linear-gradient(135deg, var(--color-success-light) 0%, #ECFDF5 100%);
}
.card.done:hover { box-shadow: 0 10px 25px -5px rgba(16,185,129,0.2); }
.done-badge {
  position: absolute; top: 8px; right: 8px;
  background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
  color: #FFF; border-radius: var(--radius-md); font-size: 10px;
  font-weight: 600; padding: 2px 8px; box-shadow: 0 2px 4px rgba(16,185,129,0.3);
}

.card-emoji { font-size: 40px; text-align: center; margin-bottom: 8px; line-height: 1; }
.card-idiom {
  font-size: 28px; font-weight: 700; text-align: center;
  font-family: var(--font-serif); color: var(--color-text-primary); margin-bottom: 4px;
  letter-spacing: 4px;
}
.card-meaning {
  font-size: 12px; color: var(--color-text-secondary); text-align: center;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.5;
}
.card-example {
  font-size: 11px; color: var(--color-text-tertiary); text-align: center;
  margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  background: var(--color-background-tertiary); border-radius: var(--radius-sm); padding: 3px 8px;
}

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex;
  align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(8px);
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--color-background-primary); border-radius: var(--radius-xl);
  border: 1px solid var(--color-border-secondary); width: 540px; max-width: 96vw;
  padding: 2rem 2.5rem 1.5rem; box-shadow: var(--shadow-xl); position: relative;
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.btn-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--color-border-secondary); background: var(--color-background-primary);
  font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 10; transition: all 0.2s ease; box-shadow: var(--shadow-md); color: var(--color-text-primary);
}
.btn-nav:hover { background: var(--color-primary-light); border-color: var(--color-primary); }
.btn-nav-prev { left: -22px; }
.btn-nav-next { right: -22px; }

.modal-cat { text-align: center; margin-bottom: 10px; }
.modal-cat-badge {
  display: inline-block; background: var(--color-primary-light); color: var(--color-primary-dark);
  border-radius: var(--radius-md); font-size: 14px; font-weight: 500; padding: 4px 18px;
}
.modal-emoji { font-size: 64px; text-align: center; margin-bottom: 8px; line-height: 1; }
.modal-idiom {
  text-align: center; font-size: 48px; font-weight: 700;
  font-family: var(--font-serif); color: var(--color-text-primary);
  letter-spacing: 8px; margin-bottom: 12px;
}
.modal-meaning {
  text-align: center; font-size: 20px; color: var(--color-text-secondary);
  margin-bottom: 8px; line-height: 1.6;
}
.modal-label {
  font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-bottom: 2px;
}
.modal-example {
  background: var(--color-background-secondary); border-radius: var(--radius-md); margin-top: 12px;
  padding: 10px 16px; font-size: 15px; color: var(--color-text-secondary); text-align: center;
  font-family: var(--font-sans); line-height: 1.6;
}
.modal-counter { text-align: center; font-size: 13px; color: var(--color-text-tertiary); margin-top: 14px; }

.modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-speak {
  flex: 0 0 auto; border: 2px solid #FCD34D; color: var(--color-primary-dark);
  background: var(--color-background-primary); border-radius: var(--radius-md);
  padding: 10px 18px; font-size: 16px; cursor: pointer; transition: all 0.2s ease; font-weight: 500;
}
.btn-speak:hover { background: var(--color-primary-light); border-color: var(--color-primary); transform: translateY(-1px); }
.btn-learn {
  flex: 1; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFF; border: none; border-radius: var(--radius-md); padding: 10px;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: inherit;
}
.btn-learn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.btn-learn.done { background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%); }
.btn-close {
  flex: 0 0 auto; border: 2px solid var(--color-border-secondary); color: var(--color-text-secondary);
  background: var(--color-background-primary); border-radius: var(--radius-md);
  padding: 10px 18px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s ease;
}
.btn-close:hover { border-color: var(--color-text-tertiary); color: var(--color-text-primary); }

.empty {
  color: var(--color-text-tertiary); font-size: 15px; padding: 3rem 2rem;
  text-align: center; grid-column: 1/-1; background: var(--color-background-primary);
  border-radius: var(--radius-xl); border: 1px dashed var(--color-border-tertiary);
}

@media (max-width: 600px) {
  #app { padding: 1rem 0.75rem 2rem; }
  .nav-tab { padding: 7px 12px; font-size: 12px; }
  .header h1 { font-size: 18px; }
  .search-box { width: 100%; }
  .grid { grid-template-columns: repeat(1, 1fr); gap: 10px; }
  .card-idiom { font-size: 24px; letter-spacing: 2px; }
  .card-emoji { font-size: 32px; }
  .modal { padding: 1.5rem 1rem 1.2rem; }
  .modal-idiom { font-size: 36px; letter-spacing: 4px; }
  .modal-meaning { font-size: 16px; }
  .btn-nav { width: 36px; height: 36px; font-size: 22px; }
  .btn-nav-prev { left: 6px; }
  .btn-nav-next { right: 6px; }
}
</style>
</head>

    <div class="modal-counter" id="mCounter"></div>
  </div>
</div>

const CATS=['全部','已学','数字','动物','励志','学习','品德','情感','自然','形容','哲理'];
let curCat='全部', learned=new Set(), selIdx=null, sq='';

function getList(){
  return IDIOMS.filter(d=>{
    const co=curCat==='全部'?true:(curCat==='已学'?learned.has(d.i):d.c===curCat);
    const qo=!sq||d.i.includes(sq)||d.m.includes(sq)||d.e.includes(sq)||d.c.includes(sq);
    return co&&qo;
  });
}

function renderStats(){
  const list=getList();
  const tot=list.length;
  const done=list.filter(d=>learned.has(d.i)).length;
  const totalDone=IDIOMS.filter(d=>learned.has(d.i)).length;
  const totalAll=IDIOMS.length;
  const pct=totalAll>0?Math.round(totalDone/totalAll*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="spill">已学 <b>${totalDone}</b> / <b>${totalAll}</b></div>
    <div class="spill">筛选 <b>${tot}</b> 条</div>
    <div class="spill">完成 <b>${pct}%</b></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>`;
}

function renderCats(){
  const counts={};
  CATS.forEach(c=>{
    if(c==='已学') counts[c]=IDIOMS.filter(d=>learned.has(d.i)).length;
    else if(c==='全部') counts[c]=IDIOMS.length;
    else counts[c]=IDIOMS.filter(d=>d.c===c).length;
  });
  document.getElementById('cats').innerHTML=CATS.map(c=>{
    const label=c==='已学'?`✅ 已学${counts[c]}条`:`${c} <span style="font-size:11px;opacity:0.7">[${counts[c]}]</span>`;
    return `<button class="cat${c===curCat?' on':''}" onclick="setCat('${c}')">${label}</button>`;
  }).join('');
}

function setCat(c){curCat=c;renderCats();renderGrid();}
function doFilter(){sq=document.getElementById('sb').value.trim();renderCats();renderGrid();}

function renderGrid(){
  const list=getList();
  if(!list.length){document.getElementById('grid').innerHTML=`<div class="empty">没有找到相关成语</div>`;return;}
  document.getElementById('grid').innerHTML=list.map(d=>{
    const isL=learned.has(d.i);
    const idx=IDIOMS.indexOf(d);
    return `<div class="card${isL?' done':''}" onclick="openModal(${idx})">
      ${isL?'<span class="done-badge">✓ 学会</span>':''}
      <div class="card-emoji">${d.emoji}</div>
      <div class="card-idiom">${d.i}</div>
      <div class="card-meaning">${d.m}</div>
      <div class="card-example">"${d.e}"</div>
    </div>`;
  }).join('');
}

function openModal(idx){
  selIdx=idx;
  const d=IDIOMS[idx];
  const isL=learned.has(d.i);
  document.getElementById('mCat').innerHTML=`<span class="modal-cat-badge">${d.c}</span>`;
  document.getElementById('mEmoji').textContent=d.emoji;
  document.getElementById('mIdiom').textContent=d.i;
  document.getElementById('mMeaning').textContent=d.m;
  document.getElementById('mEx').innerHTML=`<span style="color:var(--color-text-tertiary);font-size:12px;">例句</span><br>"${d.e}"`;
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'✅ 已学会':'⭐ 学会了';
  btn.className='btn-learn'+(isL?' done':'');
  document.getElementById('mCounter').textContent=`${idx+1} / ${IDIOMS.length}`;
  document.querySelector('.btn-nav-prev').style.opacity=idx===0?'0.3':'1';
  document.querySelector('.btn-nav-next').style.opacity=idx===IDIOMS.length-1?'0.3':'1';
  document.getElementById('ov').style.display='flex';
}

function prevItem(){if(selIdx>0)openModal(selIdx-1);}
function nextItem(){if(selIdx<IDIOMS.length-1)openModal(selIdx+1);}

document.addEventListener('keydown',function(e){
  if(document.getElementById('ov').style.display!=='none'){
    if(e.key==='ArrowLeft')prevItem();
    if(e.key==='ArrowRight')nextItem();
    if(e.key==='Escape')closeOv();
  }
});

function closeOv(e){if(!e||e.target.id==='ov'){document.getElementById('ov').style.display='none';selIdx=null;}}

function toggleL(){
  if(selIdx===null)return;
  const d=IDIOMS[selIdx];
  if(learned.has(d.i)) learned.delete(d.i); else learned.add(d.i);
  saveLearned();
  renderStats();renderCats();renderGrid();
  const isL=learned.has(d.i);
  const btn=document.getElementById('btnL');
  btn.textContent=isL?'✅ 已学会':'⭐ 学会了';
  btn.className='btn-learn'+(isL?' done':'');
}

function speakIdiom(){
  if(selIdx===null)return;
  const d=IDIOMS[selIdx];
  if('speechSynthesis' in window){
    try{
      speechSynthesis.cancel();
      setTimeout(()=>{
        const u=new SpeechSynthesisUtterance(d.i);
        u.lang='zh-CN';u.rate=0.8;u.pitch=1.0;u.volume=1.0;
        const voices=speechSynthesis.getVoices();
        const v=voices.find(v=>v.name.match(/Microsoft Yaoyao|Google 普通话|Microsoft Xiaoxiao/))||
                voices.find(v=>v.lang==='zh-CN')||
                voices.find(v=>v.lang.includes('zh'));
        if(v){u.voice=v;u.voiceURI=v.voiceURI;}
        u.onend=()=>speechSynthesis.cancel();
        speechSynthesis.speak(u);
      },50);
    }catch(e){}
  }
}

function loadLearned(){
  try{
    const d=localStorage.getItem('idiom_learned');
    return d?new Set(JSON.parse(d)):new Set();
  }catch(e){return new Set();}
}
function saveLearned(){
  localStorage.setItem('idiom_learned',JSON.stringify([...learned]));
}

if('speechSynthesis' in window){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
  setTimeout(()=>speechSynthesis.getVoices(),100);
}

learned=loadLearned();
renderStats();renderCats();renderGrid();
</script>
