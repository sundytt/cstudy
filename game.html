<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字乐园 - 趣味识字游戏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #6366F1;
  --color-primary-light: #EEEDFE;
  --color-primary-dark: #4F46E5;
  --color-success: #10B981;
  --color-success-light: #D1FAE5;
  --color-warning: #F59E0B;
  --color-warning-light: #FEF3C7;
  --color-error: #EF4444;
  --color-error-light: #FEE2E2;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F3F4F6;
  --color-background-tertiary: #F9FAFB;
  --color-border-primary: #E5E7EB;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 50%;
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-serif: 'Noto Serif TC', serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, #FDF4FF 0%, #EEF2FF 50%, #ECFEFF 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.header {
  text-align: center;
  margin-bottom: 2rem;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.header p {
  font-size: 14px;
  color: var(--color-text-secondary);
}

.game-modes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 2rem;
}

.mode-card {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border: 2px solid transparent;
  box-shadow: var(--shadow-md);
}

.mode-card:hover {
  transform: translateY(-4px);
  border-color: var(--color-primary);
  box-shadow: var(--shadow-xl);
}

.mode-card.active {
  background: linear-gradient(135deg, var(--color-primary-light) 0%, #E0E7FF 100%);
  border-color: var(--color-primary);
}

.mode-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.mode-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: 6px;
}

.mode-desc {
  font-size: 12px;
  color: var(--color-text-secondary);
}

.game-area {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  padding: 2rem;
  box-shadow: var(--shadow-lg);
  display: none;
}

.game-area.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 12px;
}

.score-board {
  display: flex;
  gap: 16px;
}

.score-item {
  background: var(--color-background-secondary);
  border-radius: var(--radius-md);
  padding: 8px 16px;
  text-align: center;
}

.score-label {
  font-size: 11px;
  color: var(--color-text-tertiary);
}

.score-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-primary);
}

.score-value.correct {
  color: var(--color-success);
}

.score-value.wrong {
  color: var(--color-error);
}

.btn-restart {
  background: var(--color-primary);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-md);
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-restart:hover {
  background: var(--color-primary-dark);
  transform: translateY(-1px);
}

.question-area {
  text-align: center;
  margin-bottom: 2rem;
}

.q-image {
  font-size: 120px;
  margin-bottom: 16px;
  animation: bounce 1s ease infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.q-text {
  font-size: 18px;
  color: var(--color-text-secondary);
  margin-bottom: 8px;
}

.q-emoji {
  font-size: 64px;
  margin-bottom: 16px;
}

.q-char {
  font-size: 80px;
  font-family: var(--font-serif);
  color: var(--color-text-primary);
  margin-bottom: 16px;
}

.btn-speak-question {
  background: var(--color-primary-light);
  color: var(--color-primary);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-full);
  width: 60px;
  height: 60px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-speak-question:hover {
  background: var(--color-primary);
  color: #FFFFFF;
  transform: scale(1.1);
}

.options-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.option-btn {
  background: var(--color-background-secondary);
  border: 2px solid var(--color-border-primary);
  border-radius: var(--radius-lg);
  padding: 20px;
  font-size: 28px;
  font-weight: 600;
  color: var(--color-text-primary);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-serif);
}

.option-btn:hover {
  background: var(--color-primary-light);
  border-color: var(--color-primary);
  transform: translateY(-2px);
}

.option-btn.selected {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #FFFFFF;
}

.option-btn.correct {
  background: var(--color-success);
  border-color: var(--color-success);
  color: #FFFFFF;
  animation: correctPulse 0.5s ease;
}

.option-btn.wrong {
  background: var(--color-error);
  border-color: var(--color-error);
  color: #FFFFFF;
  animation: shake 0.5s ease;
}

@keyframes correctPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.pair-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.pair-card {
  background: linear-gradient(135deg, var(--color-primary-light) 0%, #E0E7FF 100%);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-lg);
  padding: 16px;
  font-size: 32px;
  font-weight: 600;
  color: var(--color-primary);
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
  font-family: var(--font-serif);
  position: relative;
}

.pair-card:hover {
  transform: translateY(-2px);
}

.pair-card.selected {
  background: var(--color-primary);
  color: #FFFFFF;
  transform: scale(1.05);
}

.pair-card.matched {
  background: var(--color-success);
  border-color: var(--color-success);
  color: #FFFFFF;
  opacity: 0.6;
  pointer-events: none;
}

.story-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.q-lang-badge {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-primary);
  background: var(--color-primary-light);
  padding: 4px 14px;
  border-radius: var(--radius-md);
  margin-bottom: 10px;
}

.story-instruction {
  text-align: center;
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-bottom: 14px;
  line-height: 1.6;
}

.story-panels {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.story-panel {
  position: relative;
  background: var(--color-background-secondary);
  border: 3px solid var(--color-border-primary);
  border-radius: var(--radius-lg);
  padding: 22px 14px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.story-panel:hover {
  border-color: var(--color-primary);
  transform: translateY(-2px);
}

.story-panel.done {
  background: var(--color-success-light);
  border-color: var(--color-success);
  cursor: default;
  transform: none;
}

.story-panel.wrong {
  animation: shake 0.5s ease;
  border-color: var(--color-error);
}

.story-badge {
  position: absolute;
  top: -14px;
  left: -14px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--color-background-primary);
  border: 2px solid var(--color-border-primary);
  color: var(--color-text-tertiary);
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.story-panel.done .story-badge {
  background: var(--color-success);
  border-color: var(--color-success);
  color: #FFFFFF;
}

.story-panel-emoji {
  font-size: 56px;
  margin-bottom: 8px;
}

.story-panel-sentence {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.5;
  min-height: 20px;
}

.story-panel-sentence .zh {
  color: var(--color-text-primary);
  font-weight: 600;
  display: block;
}

.story-panel-sentence .en {
  display: block;
  font-style: italic;
}

.story-lang-toggle {
  display: block;
  margin: 10px auto 0;
  background: var(--color-background-secondary);
  border: 2px solid var(--color-primary);
  color: var(--color-primary);
  border-radius: 999px;
  padding: 6px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.story-lang-toggle:hover {
  background: var(--color-primary);
  color: #FFFFFF;
}

.btn-story-replay {
  display: block;
  margin: 16px auto 0;
  background: var(--color-primary-light);
  color: var(--color-primary);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-md);
  padding: 10px 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-story-replay:hover {
  background: var(--color-primary);
  color: #FFFFFF;
}

.result-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}

.result-modal.hidden {
  display: none;
}

.result-content {
  background: var(--color-background-primary);
  border-radius: var(--radius-xl);
  padding: 3rem;
  text-align: center;
  max-width: 400px;
  width: 90%;
  box-shadow: var(--shadow-xl);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.result-emoji {
  font-size: 80px;
  margin-bottom: 16px;
}

.result-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 8px;
}

.result-score {
  font-size: 16px;
  color: var(--color-text-secondary);
  margin-bottom: 24px;
}

.result-score b {
  color: var(--color-primary);
}

.btn-play-again {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-play-again:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--color-background-secondary);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 16px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), var(--color-success));
  border-radius: var(--radius-sm);
  transition: width 0.3s ease;
}

@media (max-width: 600px) {
  .game-area {
    padding: 1.5rem 1rem;
  }

  .q-image {
    font-size: 80px;
  }

  .q-char {
    font-size: 60px;
  }

  .options-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .option-btn {
    padding: 16px;
    font-size: 24px;
  }

  .pair-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .pair-card {
    padding: 12px;
    font-size: 24px;
  }

  .story-panels {
    gap: 10px;
  }

  .story-panel {
    padding: 16px 8px 12px;
  }

  .story-panel-emoji {
    font-size: 40px;
  }

  .story-panel-sentence {
    font-size: 12px;
  }

  .header h1 {
    font-size: 22px;
  }
}
</style>
</head>
<body>
<div id="app">
  <div id="qnav"></div>
  <script src="nav.js"></script>
  <script>QNav.init('game');</script>
  
  <div class="header">
    <h1>🎮 趣味识字游戏</h1>
    <p>选择游戏模式，开始挑战吧！</p>
  </div>

  <div class="game-modes" id="gameModes">
    <div class="mode-card" onclick="startGame('picture')">
      <div class="mode-icon">🖼️</div>
      <div class="mode-title">看图猜字</div>
      <div class="mode-desc">根据图片选择正确的汉字</div>
    </div>
    <div class="mode-card" onclick="startGame('sound')">
      <div class="mode-icon">🔊</div>
      <div class="mode-title">听音辨字</div>
      <div class="mode-desc">听发音选择正确的汉字</div>
    </div>
    <div class="mode-card" onclick="startGame('pair')">
      <div class="mode-icon">🔗</div>
      <div class="mode-title">汉字配对</div>
      <div class="mode-desc">简体字和繁体字配对</div>
    </div>
    <div class="mode-card" onclick="startGame('picture-story')">
      <div class="mode-icon">🖼️💬</div>
      <div class="mode-title">看图说话</div>
      <div class="mode-desc">4张图片连成故事，按顺序点击讲述</div>
    </div>
  </div>

  <div class="game-area" id="gameArea">
    <div class="game-header">
      <div class="score-board">
        <div class="score-item">
          <div class="score-label">得分</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
          <div class="score-label">正确</div>
          <div class="score-value correct" id="correct">0</div>
        </div>
        <div class="score-item">
          <div class="score-label">错误</div>
          <div class="score-value wrong" id="wrong">0</div>
        </div>
      </div>
      <button class="btn-restart" onclick="restartGame()">🔄 重新开始</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="question-area" id="questionArea">
    </div>

    <div class="options-grid" id="optionsGrid">
    </div>

    <div class="pair-grid" id="pairGrid">
    </div>

    <div class="story-grid" id="storyGrid">
    </div>
  </div>
</div>

<div class="result-modal hidden" id="resultModal">
  <div class="result-content">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">太棒了！</div>
    <div class="result-score" id="resultScore">得分：<b>100</b> 分</div>
    <button class="btn-play-again" onclick="closeResult()">再玩一次</button>
  </div>
</div>

<script src="raw_data.js"></script>
<script>
const TC = {1:'#EF4444',2:'#10B981',3:'#F59E0B',4:'#3B82F6',5:'#9CA3AF'};
const seen = new Set();
const CHARS = [];
for(const d of RAW){if(!seen.has(d.s)){seen.add(d.s);CHARS.push(d);}}

let currentMode = '';
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let currentQuestion = 0;
const totalQuestions = 10;
let currentAnswer = '';
let currentStory = null;
let storyProgress = [];
let storyLangMode = 'zh';
let selectedPairs = [];
let matchedPairs = new Set();

const STORIES = [
  { title:'饿肚子的小猫', scenes: [

    { emoji:'😊', en:'He sits down, catches his breath, and starts the lesson happily.', zh:'他坐下来喘了口气，开心地开始上课。' },
  ]},
  { title:'给莉莉的惊喜派对', scenes: [
    { emoji:'🤫', en:'Her friends secretly plan a surprise party for Lily.', zh:'朋友们悄悄为莉莉准备了一个惊喜派对。' },

    { emoji:'🎂', en:'Everyone laughs and sings together around the cake.', zh:'大家围着蛋糕一起唱歌大笑。' },

  { title:'突然下起的大雨', scenes: [

    { emoji:'🌧️', en:'Suddenly, dark clouds bring a heavy rain.', zh:'突然，乌云飘来，下起了大雨。' },
    { emoji:'😢', en:'Mimi has no umbrella with her and gets all wet.', zh:'米米没有带雨伞，全身都被淋湿了。' },

  ]},
  { title:'勇敢学飞的小鸟', scenes: [

    { emoji:'🍽️', en:'Its mother feeds it worms every single day.', zh:'鸟妈妈每天都喂它虫子吃。' },
    { emoji:'😨', en:'One day, the little bird feels scared to leave the nest.', zh:'有一天，小鸟害怕离开鸟窝。' },
    { emoji:'🕊️', en:'With courage, it spreads its wings and flies into the sky.', zh:'它勇敢地张开翅膀，飞向了天空。' },

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame(mode) {
  currentMode = mode;
  score = 0;
  correctCount = 0;
  wrongCount = 0;
  currentQuestion = 0;
  selectedPairs = [];
  matchedPairs = new Set();

  document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('active'));
  document.querySelector('.game-area').classList.add('active');
  
  updateScore();
  
  if (mode === 'picture') {
    nextPictureQuestion();
  } else if (mode === 'sound') {
    nextSoundQuestion();
  } else if (mode === 'pair') {
    startPairGame();
  } else if (mode === 'picture-story') {
    nextStoryQuestion();
  }
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  const progress = (currentQuestion / totalQuestions) * 100;
  document.getElementById('progressFill').style.width = `${progress}%`;
}

function nextPictureQuestion() {
  if (currentQuestion >= totalQuestions) {
    showResult();
    return;
  }

  const availableChars = CHARS.filter(c => getEmoji(c.m, c.c) !== '📚');
  const randomChar = availableChars[Math.floor(Math.random() * availableChars.length)];
  currentAnswer = randomChar.s;

  const otherChars = CHARS.filter(c => c.s !== currentAnswer);
  const wrongOptions = shuffle(otherChars).slice(0, 3);
  const options = shuffle([randomChar, ...wrongOptions]);

  document.getElementById('questionArea').innerHTML = `
    <div class="q-image">${getEmoji(randomChar.m, randomChar.c)}</div>
    <div class="q-text">请选择正确的汉字</div>
  `;

  document.getElementById('optionsGrid').innerHTML = options.map(opt => `
    <button class="option-btn" onclick="checkAnswer('${opt.s}', this)">${opt.s}</button>
  `).join('');

  document.getElementById('pairGrid').innerHTML = '';
  document.getElementById('storyGrid').innerHTML = '';
  currentQuestion++;
  updateScore();
}

function nextSoundQuestion() {
  if (currentQuestion >= totalQuestions) {
    showResult();
    return;
  }

  const randomChar = CHARS[Math.floor(Math.random() * CHARS.length)];
  currentAnswer = randomChar.s;

  const otherChars = CHARS.filter(c => c.s !== currentAnswer);
  const wrongOptions = shuffle(otherChars).slice(0, 3);
  const options = shuffle([randomChar, ...wrongOptions]);

  document.getElementById('questionArea').innerHTML = `
    <div class="q-text">点击喇叭听发音，选择正确的汉字</div>
    <button class="btn-speak-question" onclick="speakQuestion('${randomChar.s}')">🔊</button>
  `;

  document.getElementById('optionsGrid').innerHTML = options.map(opt => `
    <button class="option-btn" onclick="checkAnswer('${opt.s}', this)">${opt.s}</button>
  `).join('');

  document.getElementById('pairGrid').innerHTML = '';
  document.getElementById('storyGrid').innerHTML = '';
  currentQuestion++;
  updateScore();

  setTimeout(() => speakQuestion(randomChar.s), 500);
}

function getVoice(lang) {
  const voices = speechSynthesis.getVoices();
  if (lang === 'en') {
    let voice = voices.find(v => v.lang === 'en-US' && v.name.includes('Premium'));
    if (!voice) voice = voices.find(v => v.lang === 'en-US');
    if (!voice) voice = voices.find(v => v.lang && v.lang.startsWith('en'));
    return voice;
  }
  const targetLang = lang === 'yue' ? 'zh-HK' : 'zh-CN';
  const priorityPatterns = [
    /Microsoft Yaoyao/,
    /Google 普通话/,
    /Google Chinese/,
    /Microsoft Xiaoxiao/,
    /Microsoft Huihui/,
    /Tingting/,
    /Sinji/,
    /Liangliang/,
    /Meimei/
  ];
  let voice = voices.find(v => v.lang === targetLang);
  if (!voice) {
    for (const pattern of priorityPatterns) {
      voice = voices.find(v => v.name.match(pattern));
      if (voice) break;
    }
  }
  if (!voice) voice = voices.find(v => v.lang.includes('zh'));
  if (!voice && voices.length > 0) voice = voices[0];
  return voice;
}

function speakQuestion(char) {
  if ('speechSynthesis' in window) {
    try {
      speechSynthesis.cancel();
      setTimeout(() => {
        const u = new SpeechSynthesisUtterance(char);
        u.lang = 'zh-CN';
        u.rate = 0.85;
        u.pitch = 1.0;
        const voice = getVoice('zh-CN');
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      }, 50);
    } catch (e) {
      console.log('Speech error:', e);
    }
  }
}

function checkAnswer(selected, btn) {
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  if (selected === currentAnswer) {
    btn.classList.add('correct');
    score += 10;
    correctCount++;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent === currentAnswer) b.classList.add('correct');
    });
    wrongCount++;
  }

  updateScore();

  setTimeout(() => {
    if (currentMode === 'picture') {
      nextPictureQuestion();
    } else if (currentMode === 'sound') {
      nextSoundQuestion();
    }
  }, 1000);
}

function startPairGame() {
  const differentChars = CHARS.filter(c => c.s !== c.t);
  const selectedChars = shuffle(differentChars).slice(0, 6);
  
  const cards = [];
  selectedChars.forEach(c => {
    cards.push({ char: c.s, type: 'simp', pairId: c.s });
    cards.push({ char: c.t, type: 'trad', pairId: c.s });
  });
  
  const shuffledCards = shuffle(cards);

  document.getElementById('questionArea').innerHTML = `
    <div class="q-text">点击卡片，将简体字和繁体字配对</div>
  `;

  document.getElementById('optionsGrid').innerHTML = '';
  document.getElementById('storyGrid').innerHTML = '';

  document.getElementById('pairGrid').innerHTML = shuffledCards.map((card, index) => `
    <div class="pair-card" onclick="selectPair(${index}, '${card.pairId}', this)">${card.char}</div>
  `).join('');

  currentQuestion = 1;
  updateScore();
}

function nextStoryQuestion() {
  if (currentQuestion >= totalQuestions) {
    showResult();
    return;
  }

  const oldBtn = document.getElementById('storyReplayBtn');
  if (oldBtn) oldBtn.remove();

  currentStory = STORIES[Math.floor(Math.random() * STORIES.length)];
  storyProgress = [];

  const displayOrder = shuffle(currentStory.scenes.map((s, i) => i));

  document.getElementById('questionArea').innerHTML = `
    <div class="q-lang-badge">🖼️💬 ${currentStory.title}</div>
    <div class="story-instruction" id="storyInstruction">请按故事发生的顺序，依次点击图片<br>Click the pictures in the correct story order</div>
    <button class="story-lang-toggle" id="storyLangToggle" onclick="toggleStoryLang()">${storyLangMode === 'zh' ? '🇬🇧 切换英文' : '🇨🇳 切换中文'}</button>
  `;

  document.getElementById('optionsGrid').innerHTML = '';
  document.getElementById('pairGrid').innerHTML = '';
  document.getElementById('storyGrid').innerHTML = `
    <div class="story-panels">
      ${displayOrder.map(sceneIndex => `
        <div class="story-panel" id="storyPanel-${sceneIndex}" onclick="checkStoryOrder(${sceneIndex}, this)">
          <div class="story-badge"></div>
          <div class="story-panel-emoji">${currentStory.scenes[sceneIndex].emoji}</div>
          <div class="story-panel-sentence"></div>
        </div>
      `).join('')}
    </div>
  `;

  currentQuestion++;
  updateScore();
}

function renderStorySentence(panelEl, scene) {
  const text = storyLangMode === 'zh' ? scene.zh : scene.en;
  const cls = storyLangMode === 'zh' ? 'zh' : 'en';
  panelEl.querySelector('.story-panel-sentence').innerHTML = `<span class="${cls}">${text}</span>`;
}

function toggleStoryLang() {
  storyLangMode = storyLangMode === 'zh' ? 'en' : 'zh';
  const btn = document.getElementById('storyLangToggle');
  if (btn) btn.innerHTML = storyLangMode === 'zh' ? '🇬🇧 切换英文' : '🇨🇳 切换中文';
  if (!currentStory) return;
  document.querySelectorAll('.story-panel.done').forEach(panelEl => {
    const sceneIndex = Number(panelEl.id.replace('storyPanel-', ''));
    const scene = currentStory.scenes[sceneIndex];
    if (scene) renderStorySentence(panelEl, scene);
  });
}

function checkStoryOrder(sceneIndex, panelEl) {
  if (panelEl.classList.contains('done')) return;

  const expected = storyProgress.length;

  if (sceneIndex === expected) {
    const scene = currentStory.scenes[sceneIndex];
    panelEl.classList.add('done');
    panelEl.querySelector('.story-badge').textContent = expected + 1;
    renderStorySentence(panelEl, scene);
    speakStorySentence(scene);
    storyProgress.push(sceneIndex);

    const instruction = document.getElementById('storyInstruction');

    if (storyProgress.length === currentStory.scenes.length) {
      score += 10;
      correctCount++;
      updateScore();
      if (instruction) instruction.innerHTML = '🎉 故事讲完啦！Great job telling the story!';
      document.getElementById('storyGrid').insertAdjacentHTML('beforeend', `
        <button class="btn-story-replay" id="storyReplayBtn" onclick="replayStory()">🔊 完整播放故事</button>
      `);
      setTimeout(() => {
        nextStoryQuestion();
      }, 3200);
    } else {
      if (instruction) instruction.innerHTML = `真棒！接着找第 ${expected + 2} 张图片吧～ (${storyProgress.length}/${currentStory.scenes.length})`;
    }
  } else {
    panelEl.classList.add('wrong');
    wrongCount++;
    updateScore();
    setTimeout(() => panelEl.classList.remove('wrong'), 500);
  }
}

function speakBilingual(zhText, enText, onDone) {
  if (!('speechSynthesis' in window)) {
    if (onDone) onDone();
    return;
  }
  const uZh = new SpeechSynthesisUtterance(zhText);
  uZh.lang = 'zh-CN';
  uZh.rate = 0.85;
  const vZh = getVoice('zh-CN');
  if (vZh) uZh.voice = vZh;

  const uEn = new SpeechSynthesisUtterance(enText);
  uEn.lang = 'en-US';
  uEn.rate = 0.85;
  const vEn = getVoice('en');
  if (vEn) uEn.voice = vEn;

  uZh.onend = () => speechSynthesis.speak(uEn);
  uEn.onend = () => { if (onDone) onDone(); };

  speechSynthesis.speak(uZh);
}

function speakStorySentence(scene) {
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    setTimeout(() => speakBilingual(scene.zh, scene.en), 50);
  } catch (e) {
    console.log('Speech error:', e);
  }
}

function replayStory() {
  if (!currentStory || !('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const scenes = currentStory.scenes;
    let i = 0;
    const playNext = () => {
      if (i >= scenes.length) return;
      const scene = scenes[i];
      i++;
      speakBilingual(scene.zh, scene.en, playNext);
    };
    setTimeout(playNext, 50);
  } catch (e) {
    console.log('Speech error:', e);
  }
}

function selectPair(index, pairId, card) {
  if (card.classList.contains('selected') || card.classList.contains('matched')) {
    return;
  }

  if (selectedPairs.length >= 2) {
    selectedPairs.forEach(p => p.card.classList.remove('selected'));
    selectedPairs = [];
  }

  card.classList.add('selected');
  selectedPairs.push({ index, pairId, card });

  if (selectedPairs.length === 2) {
    const [first, second] = selectedPairs;
    
    if (first.pairId === second.pairId) {
      first.card.classList.add('matched');
      second.card.classList.add('matched');
      matchedPairs.add(first.pairId);
      score += 10;
      correctCount++;
      updateScore();
      
      if (matchedPairs.size >= 6) {
        setTimeout(showResult, 500);
      }
    } else {
      wrongCount++;
      updateScore();
      
      setTimeout(() => {
        first.card.classList.remove('selected');
        second.card.classList.remove('selected');
      }, 500);
    }
    
    selectedPairs = [];
  }
}

function showResult() {
  const modal = document.getElementById('resultModal');
  const emoji = document.getElementById('resultEmoji');
  const title = document.getElementById('resultTitle');
  const scoreEl = document.getElementById('resultScore');

  const percentage = (correctCount / (correctCount + wrongCount)) * 100;
  
  if (percentage >= 90) {
    emoji.textContent = '🏆';
    title.textContent = '太棒了！';
  } else if (percentage >= 70) {
    emoji.textContent = '🎉';
    title.textContent = '做得不错！';
  } else if (percentage >= 50) {
    emoji.textContent = '💪';
    title.textContent = '继续加油！';
  } else {
    emoji.textContent = '📚';
    title.textContent = '多多练习！';
  }

  scoreEl.innerHTML = `得分：<b>${score}</b> 分<br>正确：${correctCount} 个 | 错误：${wrongCount} 个`;
  modal.classList.remove('hidden');
}

function closeResult() {
  document.getElementById('resultModal').classList.add('hidden');
  restartGame();
}

function restartGame() {
  startGame(currentMode);
}

if ('speechSynthesis' in window) {
  const loadVoices = () => speechSynthesis.getVoices();
  loadVoices();
  if (speechSynthesis.onvoiceschanged === undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  setTimeout(loadVoices, 100);
}
</script>
